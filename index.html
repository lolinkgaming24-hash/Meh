<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Hidden Legends</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, gameState = 'MENU', mode = 1, matchTimer = 90, timerDisplay;
let selections = { p1: null, p2: null };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];
const HP_MAP = { Swordman:120, Wizard:80, Bomber:100, Digger:90, Engineer:110, Freezer:100, Ghost:150, Reaper:130 };

function preload() {}

function create() {
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

// --- MENU LOGIC ---
function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 80, 'STICKMAN BRAWLER', { fontSize: '50px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createBtn(this, 425, 200, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createBtn(this, 425, 280, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT YOUR FIGHTER', { fontSize: '24px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createBtn(this, 425, 85 + (i * 42), name, () => { selections.p1 = name; moveNext.call(this); });
    });
    // EXPLICIT RANDOM BUTTON
    createBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p1 = 'Random'; moveNext.call(this); }, '#444', '#ff0');
}

function moveNext() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT YOUR FIGHTER', { fontSize: '24px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createBtn(this, 425, 85 + (i * 42), name, () => { selections.p2 = name; startMatch.call(this); });
    });
    createBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p2 = 'Random'; startMatch.call(this); }, '#444', '#ff0');
}

function getRandomRoll() {
    let r = Math.random();
    if (r < 0.12) return 'Ghost';
    if (r < 0.24) return 'Reaper';
    return CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

// --- GAMEPLAY ---
function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    matchTimer = 90;

    let c1 = (selections.p1 === 'Random') ? getRandomRoll() : selections.p1;
    let c2 = (selections.p2 === 'Random') ? getRandomRoll() : selections.p2;

    p1 = spawnChar(this, 150, 300, 0x00ff00, c1, 1);
    p2 = spawnChar(this, 700, 300, 0xff0000, c2, 2);

    let floor = this.add.rectangle(425, 470, 850, 20, 0x333);
    this.physics.add.existing(floor, true);
    this.physics.add.collider([p1, p2], floor);

    // Overlaps
    this.physics.add.overlap(projectiles, [p1, p2], (target, proj) => {
        if (proj.owner !== target.id) {
            if (proj.isBeam) dealDamage(proj.launcher, target, target.isBlocking ? 0.2 : 0.6, false);
            else if (proj.isFreeze) applyStun(target, 3000, true);
            else { dealDamage(proj.launcher, target, target.isBlocking ? 6 : 18); proj.destroy(); }
        }
    });

    // CLASH LOGIC
    this.physics.add.overlap(projectiles, projectiles, (b1, b2) => {
        if (b1.isBeam && b2.isBeam && b1.owner !== b2.owner) {
            let cx = (b1.launcher.x + b2.launcher.x)/2;
            let sp = this.add.circle(cx + Phaser.Math.Between(-10,10), b1.y, 5, 0xffffff);
            this.tweens.add({ targets: sp, alpha: 0, scale: 2, y: sp.y - 30, duration: 200, onComplete: () => sp.destroy() });
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);
    timerDisplay = this.add.text(425, 30, '01:30', { fontSize: '32px', color: '#fff' }).setOrigin(0.5);
    
    createBtn(this, 425, 80, 'PAUSE', () => pauseGame.call(this), '#222', '#fff', 12);
    setupControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN,SHIFT,SPACE');
    gameState = 'PLAYING';
}

function spawnChar(scene, x, y, col, type, id) {
    let container = scene.add.container(x, y);
    let skin = (type === 'Ghost' || type === 'Reaper') ? 0x888888 : col;
    
    // Weapon Logic
    let weapon;
    if (type === 'Ghost') weapon = scene.add.circle(0,0,0);
    else if (type === 'Reaper') weapon = scene.add.rectangle(20, 0, 30, 6, 0xffffff).setOrigin(0, 0.5);
    else if (type === 'Digger') {
        weapon = scene.add.container(20, 0);
        weapon.add([scene.add.rectangle(0,0,30,4,0x664422), scene.add.rectangle(25,-5,10,15,0x888).setAngle(45)]);
    } else if (type === 'Engineer') {
        weapon = scene.add.container(20, 0);
        weapon.add([scene.add.rectangle(0,0,25,6,0x555), scene.add.rectangle(25,-3,8,12,0x555)]);
    } else if (type === 'Freezer') {
        weapon = scene.add.container(20, 0);
        weapon.add([scene.add.rectangle(0,0,30,4,0xfff), scene.add.circle(30,0,6,0x00ffff)]);
    } else {
        weapon = scene.add.rectangle(20, 0, 30, 6, 0xccc).setOrigin(0, 0.5);
    }

    container.add([scene.add.circle(0, -25, 15, skin), scene.add.rectangle(0, 5, 8, 40, skin), weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);

    container.hp = HP_MAP[type]; container.maxHp = HP_MAP[type]; container.type = type; container.id = id;
    container.skillCD = 0; container.atkCD = 0; container.facing = (id === 1 ? 1 : -1);
    container.isStunned = false; container.isChannelling = false; container.shieldHits = 0;
    
    container.spirit = scene.add.circle(-25, -45, 12, 0x666666, 0.4).setAlpha(0);
    container.shield = scene.add.circle(0, 0, 45, 0x00ffff, 0.2).setAlpha(0);
    container.ice = scene.add.rectangle(0, -10, 60, 80, 0x00ffff, 0.5).setAlpha(0);
    container.stars = scene.add.text(0, -60, '💫', { fontSize: '24px' }).setOrigin(0.5).setAlpha(0);
    
    container.add([container.spirit, container.shield, container.ice, container.stars]);
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    matchTimer -= delta/1000;
    let mins = Math.floor(matchTimer/60), secs = Math.floor(matchTimer%60);
    timerDisplay.setText(`${mins}:${secs < 10 ? '0'+secs : secs}`);
    if (matchTimer <= 0) endGame.call(this, p1.hp >= p2.hp ? "PLAYER 1" : "PLAYER 2");

    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.alpha = p.isInvisible ? 0.2 : 1;
        p.shield.setAlpha(p.shieldHits > 0 ? 0.5 : 0);
        if (p.type === 'Reaper') p.spirit.setAlpha(p.hp < (p.maxHp/2) ? 0.7 : 0);
    });

    this.p1Bar.width = Math.max(0, p1.hp) * (200/p1.maxHp);
    this.p2Bar.width = Math.max(0, p2.hp) * (200/p2.maxHp);

    p1.isBlocking = (this.keys.SHIFT.isDown || p1.mBlock);
    move(p1, this.keys.A, this.keys.D, this.keys.W);
    if (mode === 2) {
        p2.isBlocking = (this.keys.SPACE.isDown || p2.mBlock);
        move(p2, this.keys.LEFT, this.keys.RIGHT, this.keys.UP);
    } else runAI(p2, p1);

    projectiles.getChildren().forEach(proj => {
        if (proj.isBeam) { proj.x = proj.launcher.x + (proj.launcher.facing * 400); proj.y = proj.launcher.y; }
        else if (proj.isBall) { proj.x += proj.moveDir * 12; if(proj.x < -100 || proj.x > 950) proj.destroy(); }
    });

    if (p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "PLAYER 2" : "PLAYER 1");
}

function move(p, l, r, u) {
    if (p.isStunned || p.isChannelling || p.isBlocking) { p.body.setVelocityX(0); return; }
    if (l.isDown || p.mLeft) { p.body.setVelocityX(-240); p.facing = -1; p.list[2].scaleX = -1; }
    else if (r.isDown || p.mRight) { p.body.setVelocityX(240); p.facing = 1; p.list[2].scaleX = 1; }
    else p.body.setVelocityX(0);
    if ((u.isDown || p.mJump) && p.body.touching.down) p.body.setVelocityY(-630);
}

function handleCombat(a, t, type) {
    if (a.isStunned || a.isBlocking || a.isChannelling || gameState !== 'PLAYING') return;

    if (type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 800;
        a.scene.tweens.add({ targets: a.list[2], angle: a.facing > 0 ? 90 : -90, duration: 150, yoyo: true });
        if (Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 110) {
            let d = 10;
            if (a.type === 'Reaper') d = (a.hp < a.maxHp/2) ? 10 : 5;
            else if (a.type === 'Ghost') d = 14;
            else if (a.type === 'Freezer') { applyStun(t, 500, true); d = 6; }
            if (a.isInvisible) { a.isInvisible = false; applyStun(t, 1500, false); d = 25; }
            dealDamage(a, t, t.isBlocking ? d/4 : d);
        }
    }

    if (type === 'skl' && a.skillCD <= 0) {
        a.skillCD = (a.type === 'Reaper' && a.hp < a.maxHp/2) ? 20000 : 9000;
        if (a.type === 'Reaper') {
            if (a.hp >= a.maxHp/2) { a.hp = Math.min(a.maxHp, a.hp + 12); }
            else fireBeam(a, 0xff00ff);
        } else if (a.type === 'Ghost') fireBeam(a, 0x00ffff);
        else if (a.type === 'Wizard') {
            let b = a.scene.add.circle(a.x, a.y, 20, 0xff6600);
            a.scene.physics.add.existing(b); b.body.setAllowGravity(false);
            b.moveDir = a.facing; b.owner = a.id; b.launcher = a; b.isBall = true; projectiles.add(b);
        } else if (a.type === 'Digger') a.isInvisible = true;
        else if (a.type === 'Engineer') a.shieldHits = 3;
        else if (a.type === 'Freezer') {
            let w = a.scene.add.rectangle(a.x + (a.facing * 160), a.y, 320, 80, 0x00ffff, 0.4);
            a.scene.physics.add.existing(w); w.body.setAllowGravity(false);
            w.owner = a.id; w.launcher = a; w.isFreeze = true; projectiles.add(w);
            a.scene.time.delayedCall(400, () => w.destroy());
        } else if (a.type === 'Bomber') {
            let b = a.scene.add.circle(a.x, a.y, 16, 0x333);
            a.scene.physics.add.existing(b); b.body.setVelocity(a.facing * 480, -450);
            b.owner = a.id; b.launcher = a; projectiles.add(b);
            a.scene.time.delayedCall(1200, () => {
                if(!b.active) return;
                let ex = a.scene.add.circle(b.x, b.y, 130, 0xffaa00, 0.6);
                if (Phaser.Math.Distance.Between(ex.x, ex.y, t.x, t.y) < 140) dealDamage(a, t, 45);
                b.destroy(); a.scene.tweens.add({ targets: ex, scale: 1.5, alpha: 0, duration: 300, onComplete: () => ex.destroy() });
            });
        }
    }
}

function fireBeam(a, col) {
    a.isChannelling = true;
    let b = a.scene.add.container(a.x+(a.facing*400), a.y, [
        a.scene.add.rectangle(0,0,800,100,col,0.3),
        a.scene.add.rectangle(0,0,800,35,0xfff,0.8)
    ]);
    a.scene.physics.add.existing(b); b.body.setAllowGravity(false);
    b.owner = a.id; b.launcher = a; b.isBeam = true; projectiles.add(b);
    a.scene.time.delayedCall(2500, () => { b.destroy(); a.isChannelling = false; });
}

function applyStun(t, dur, ice) {
    if (t.isStunned) return;
    t.isStunned = true;
    ice ? t.ice.setAlpha(1) : t.stars.setAlpha(1);
    t.scene.time.delayedCall(dur, () => { t.isStunned = false; t.ice.setAlpha(0); t.stars.setAlpha(0); });
}

function dealDamage(a, t, d, fx=true) {
    if (t.shieldHits > 0 && d > 1) { t.shieldHits--; return; }
    t.hp -= d;
    if (fx) {
        let p = a.scene.add.circle(t.x, t.y, 15, 0xfff, 0.6);
        a.scene.tweens.add({ targets: p, alpha: 0, scale: 2, duration: 200, onComplete: () => p.destroy() });
    }
}

function pauseGame() {
    this.physics.pause(); gameState = 'PAUSED';
    let ov = this.add.rectangle(425, 240, 850, 480, 0x000, 0.8).setDepth(1000);
    createBtn(this, 425, 200, 'RESUME', () => { ov.destroy(); this.physics.resume(); gameState = 'PLAYING'; showMatchUI(); }, '#111', '#fff', 1001);
    createBtn(this, 425, 280, 'QUIT', () => { this.physics.resume(); showMenu.call(this); }, '#111', '#fff', 1001);
}

function showMatchUI() { this.children.each(c => { if(c.type === 'Text' && (c.text === 'RESUME' || c.text === 'QUIT')) c.destroy(); }); }

function setupControls() {
    const d = (x, y, l, cb) => {
        let b = this.add.circle(x, y, 38, 0xfff, 0.15).setInteractive().setDepth(500);
        this.add.text(x, y, l).setOrigin(0.5).setDepth(501);
        b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
    };
    d(70, 410, '←', v => p1.mLeft = v); d(170, 410, '→', v => p1.mRight = v);
    d(120, 320, '↑', v => p1.mJump = v); d(280, 410, 'ATK', v => { if(v) handleCombat(p1, p2, 'atk') });
    d(380, 410, 'SKL', v => { if(v) handleCombat(p1, p2, 'skl') }); d(330, 320, 'BLK', v => p1.mBlock = v);
    if (mode === 2) {
        d(470, 410, 'SKL', v => { if(v) handleCombat(p2, p1, 'skl') }); d(570, 410, 'ATK', v => { if(v) handleCombat(p2, p1, 'atk') });
        d(520, 320, 'BLK', v => p2.mBlock = v); d(680, 410, '←', v => p2.mLeft = v);
        d(780, 410, '→', v => p2.mRight = v); d(730, 320, '↑', v => p2.mJump = v);
    }
}

function createBtn(s, x, y, t, c, bg='#222', fg='#fff', depth=1) { 
    return s.add.text(x, y, t, { backgroundColor: bg, padding: 12, color: fg }).setOrigin(0.5).setInteractive().on('pointerdown', c).setDepth(depth); 
}

function endGame(w) { 
    gameState = 'END'; this.physics.pause();
    this.add.text(425, 200, w + " WINS!", { fontSize: '60px', color: '#fff' }).setOrigin(0.5);
    createBtn(this, 425, 300, 'REMATCH', () => startMatch.call(this));
}

function runAI(c, t) {
    if (c.isChannelling || c.isStunned || c.isBlocking) return;
    let dist = Math.abs(c.x - t.x);
    if (dist > 150) c.body.setVelocityX(c.x > t.x ? -160 : 160);
    else c.body.setVelocityX(0);
    c.facing = c.x > t.x ? -1 : 1;
    if (c.skillCD <= 0 && dist < 300) handleCombat(c, t, 'skl');
    if (c.atkCD <= 0 && dist < 110) handleCombat(c, t, 'atk');
    if (t.y < c.y - 50 && c.body.touching.down) c.body.setVelocityY(-600);
}
</script>
</body>
</html>
