<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Knockback & Shatter</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 5 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    showMenu.call(this);
}

function showMenu() {
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(425, 50, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createMenuBtn(this, 425, 120 + (i * 55), name, () => {
            selections.p1 = name;
            if (mode === 2) selectP2.call(this);
            else { selections.p2 = classes[Math.floor(Math.random()*5)]; startMatch.call(this); }
        });
    });
}

function selectP2() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(425, 50, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createMenuBtn(this, 425, 120 + (i * 55), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function startMatch() {
    this.children.removeAll();
    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 200, 300, 0x00ff00, selections.p1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, selections.p2, 2);
    
    this.physics.add.collider([p1, p2], ground);

    // HUD
    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p1CD = this.add.rectangle(20, 50, 0, 6, 0xffff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);
    this.p2CD = this.add.rectangle(830, 50, 0, 6, 0xffff00).setOrigin(1, 0);

    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE,F,UP,LEFT,RIGHT,DOWN,ENTER,P');

    let count = 3;
    let txt = this.add.text(425, 200, '3', { fontSize: '80px', color: '#fff' }).setOrigin(0.5);
    let timer = setInterval(() => {
        count--;
        txt.setText(count > 0 ? count : 'GO!');
        if(count < 0) { txt.destroy(); gameState = 'PLAYING'; clearInterval(timer); }
    }, 1000);
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let head = scene.add.circle(0, -25, 15, color);
    let body = scene.add.rectangle(0, 5, 8, 40, color);
    
    let weapon;
    if(type === 'Swordman') weapon = scene.add.rectangle(20, 0, 45, 8, 0xccc).setOrigin(0, 0.5);
    else if(type === 'Gunman') weapon = scene.add.rectangle(20, 0, 30, 12, 0x444).setOrigin(0, 0.5);
    else if(type === 'Bomber') weapon = scene.add.circle(20, 0, 12, 0x222);
    else if(type === 'Digger') weapon = scene.add.rectangle(20, 0, 30, 6, 0x8b4513).setOrigin(0, 0.5);
    else weapon = scene.add.rectangle(20, 0, 20, 20, 0xffaa00).setOrigin(0, 0.5);

    let shield = scene.add.circle(0, 0, 50, 0x00ffff, 0.15).setStrokeStyle(3, 0x00ffff).setVisible(false);
    
    container.add([head, body, weapon, shield]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70).setDragX(800);
    
    container.hp = 100; container.type = type; container.id = id;
    container.skillCD = 0; container.atkCD = 0; container.shieldHits = 0;
    container.isBlocking = false; container.blockStamina = 100; container.isShattered = false;
    return container;
}

function setupMobileControls() {
    // Spaced P1 Controls
    drawBtn(this, 70, 350, '←', (v)=>p1.mLeft=v);
    drawBtn(this, 170, 350, '→', (v)=>p1.mRight=v);
    drawBtn(this, 120, 270, '↑', (v)=>{ if(v && p1.body.touching.down) p1.body.setVelocityY(-600)});
    drawBtn(this, 120, 430, 'BLK', (v)=>p1.isBlocking=v);
    drawBtn(this, 280, 330, 'ATK', (v)=>{ if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(this, 370, 410, 'SKL', (v)=>{ if(v) handleCombat(p1, p2, 'skl') });

    // Spaced P2 Controls
    if(mode === 2) {
        drawBtn(this, 780, 350, '→', (v)=>p2.mRight=v);
        drawBtn(this, 680, 350, '←', (v)=>p2.mLeft=v);
        drawBtn(this, 730, 270, '↑', (v)=>{ if(v && p2.body.touching.down) p2.body.setVelocityY(-600)});
        drawBtn(this, 730, 430, 'BLK', (v)=>p2.isBlocking=v);
        drawBtn(this, 570, 330, 'ATK', (v)=>{ if(v) handleCombat(p2, p1, 'atk') });
        drawBtn(this, 480, 410, 'SKL', (v)=>{ if(v) handleCombat(p2, p1, 'skl') });
    }
}

function drawBtn(scene, x, y, label, callback) {
    let b = scene.add.circle(x, y, 40, 0xffffff, 0.1).setInteractive().setDepth(100);
    scene.add.text(x, y, label, {fontSize: '18px', fontStyle: 'bold'}).setOrigin(0.5).setDepth(101);
    b.on('pointerdown', () => callback(true));
    b.on('pointerup', () => callback(false));
    b.on('pointerout', () => callback(false));
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    p1.isBlocking = (this.keys.S.isDown || p1.isBlocking) && !p1.isShattered;
    processMove(p1, this.keys.A, this.keys.D);

    if(mode === 2) {
        p2.isBlocking = (this.keys.DOWN.isDown || p2.isBlocking) && !p2.isShattered;
        processMove(p2, this.keys.LEFT, this.keys.RIGHT);
    } else processAI(p2, p1);

    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        
        // Block Stamina Regen
        if (!p.isBlocking && p.blockStamina < 100) p.blockStamina += 0.2;
        if (p.isShattered) { p.list[0].tint = 0xff0000; p.alpha = 0.6; }
        else if (p.isBlocking) p.list[0].tint = 0x00aaff;
        else p.list[0].tint = 0xffffff;
    });

    this.p1CD.width = (p1.skillCD / 10000) * 200;
    this.p2CD.width = (p2.skillCD / 10000) * 200;
    this.p1Bar.width = Math.max(0, p1.hp) * 2;
    this.p2Bar.width = Math.max(0, p2.hp) * 2;

    if(p1.hp <= 0 || p2.hp <= 0) endGame(this, p1.hp <= 0 ? "P2" : "P1");
}

function processMove(p, l, r) {
    if (p.isShattered) { p.body.setVelocityX(0); return; }
    let speed = p.isBlocking ? 100 : 220;
    if (l.isDown || p.mLeft) { p.body.setVelocityX(-speed); p.list[2].x = -20; p.list[2].scaleX = -1; }
    else if (r.isDown || p.mRight) { p.body.setVelocityX(speed); p.list[2].x = 20; p.list[2].scaleX = 1; }
    else p.body.setVelocityX(0);
}

function processAI(cpu, target) {
    let dist = Math.abs(cpu.x - target.x);
    cpu.isBlocking = (dist < 100 && cpu.blockStamina > 30 && (target.atkCD > 0 || Math.random() > 0.8));

    if (dist > 80) cpu.body.setVelocityX(cpu.x > target.x ? -150 : 150);
    else {
        cpu.body.setVelocityX(0);
        if(!cpu.isBlocking && cpu.atkCD <= 0 && Math.random() > 0.9) handleCombat(cpu, target, 'atk');
    }
    if(cpu.skillCD <= 0 && dist < 160 && Math.random() > 0.98) handleCombat(cpu, target, 'skl');
    if(Math.random() > 0.99 && cpu.body.touching.down) cpu.body.setVelocityY(-600);
}

function handleCombat(a, t, type) {
    if (a.isBlocking || a.isShattered) return; 
    let d = Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y);
    let scene = a.scene;

    if(type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 450;
        scene.tweens.add({ targets: a.list[2], angle: a.list[2].scaleX > 0 ? 80 : -80, duration: 80, yoyo: true });
        if(d < 85) dealDamage(a, t, 6, 25);
    }

    if(type === 'skl' && a.skillCD <= 0) {
        a.skillCD = 10000;
        if(a.type === 'Engineer') a.shieldHits = 3;
        else if (a.type === 'Bomber') {
            spawnFX(scene, a.x, a.y, 0xff4400, 120);
            if(d < 180) {
                let dir = (t.x > a.x) ? 600 : -600;
                t.body.setVelocity(dir, -400); // EXPLOSION KNOCKBACK
                dealDamage(a, t, 15, 40);
            }
        }
        else if (d < 160) {
            dealDamage(a, t, 18, 50);
            spawnFX(scene, a.x, a.y, 0xffff00, 80);
        }
    }
}

function dealDamage(a, t, dmg, stamDmg) {
    if (t.isBlocking) {
        t.blockStamina -= stamDmg;
        t.hp -= (dmg * 0.2);
        if (t.blockStamina <= 0) {
            t.isShattered = true;
            t.isBlocking = false;
            a.scene.time.delayedCall(1500, () => { t.isShattered = false; t.blockStamina = 50; });
        }
    } else {
        if(t.shieldHits > 0) t.shieldHits--;
        else t.hp -= dmg;
    }
    spawnFX(a.scene, t.x, t.y, t.isBlocking ? 0x00aaff : 0xffffff);
}

function spawnFX(scene, x, y, color, size=15) {
    let s = scene.add.circle(x, y, size, color, 0.4);
    scene.tweens.add({ targets: s, alpha: 0, scale: 2, duration: 250, onComplete: ()=>s.destroy() });
}

function endGame(scene, winner) {
    scene.add.text(425, 200, winner + " WINS!", {fontSize: '64px'}).setOrigin(0.5);
    gameState = 'END';
    setTimeout(()=>location.reload(), 3000);
}

function createMenuBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 12, color: '#fff' })
        .setOrigin(0.5).setInteractive().on('pointerdown', cb);
}
</script>
</body>
</html>
