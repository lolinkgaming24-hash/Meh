<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#1a1a1a');
    showMenu.call(this);
}

function showMenu() {
    this.children.removeAll();
    this.add.text(400, 100, 'STICKMAN BRAWLER', { fontSize: '42px', color: '#fff' }).setOrigin(0.5);
    createBtn(this, 400, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createBtn(this, 400, 300, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(400, 50, 'PLAYER 1 SELECT', { fontSize: '24px', color: '#0f0' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createBtn(this, 400, 120 + (i * 55), name, () => {
            selections.p1 = name;
            if (mode === 2) selectP2.call(this);
            else { selections.p2 = classes[Math.floor(Math.random()*5)]; startMatch.call(this); }
        });
    });
}

function selectP2() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(400, 50, 'PLAYER 2 SELECT', { fontSize: '24px', color: '#f00' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createBtn(this, 400, 120 + (i * 55), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function startMatch() {
    this.children.removeAll();
    let ground = this.add.rectangle(400, 440, 800, 40, 0x333);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 150, 300, 0x00ff00, selections.p1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, selections.p2, 2);
    
    this.physics.add.collider(p1, ground);
    this.physics.add.collider(p2, ground);

    // Health Bars
    this.p1Bar = this.add.rectangle(20, 20, 200, 15, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(780, 20, 200, 15, 0xff0000).setOrigin(1, 0);

    // Cooldown Bars (Yellow)
    this.p1CD = this.add.rectangle(20, 40, 0, 5, 0xffff00).setOrigin(0);
    this.p2CD = this.add.rectangle(780, 40, 0, 5, 0xffff00).setOrigin(1, 0);

    setupMobileControls.call(this);

    let count = 3;
    let txt = this.add.text(400, 200, '3', { fontSize: '64px' }).setOrigin(0.5);
    let timer = setInterval(() => {
        count--;
        txt.setText(count > 0 ? count : 'FIGHT!');
        if(count < 0) { txt.destroy(); gameState = 'PLAYING'; clearInterval(timer); }
    }, 1000);

    this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE,F,Q,UP,LEFT,RIGHT,ENTER,SHIFT,P');
}

function createChar(scene, x, y, color, type, id) {
    let c = scene.add.container(x, y);
    c.add([scene.add.circle(0, -15, 12, color), scene.add.rectangle(0, 10, 4, 30, color)]);
    scene.physics.add.existing(c);
    c.body.setCollideWorldBounds(true).setSize(30, 50);
    c.hp = 100; c.type = type; c.id = id; c.cd = 0; c.isBlocking = false;
    return c;
}

function setupMobileControls() {
    // P1 Controls (Bottom Left)
    drawBtn(this, 50, 400, '←', () => p1.mLeft = true, () => p1.mLeft = false);
    drawBtn(this, 120, 400, '→', () => p1.mRight = true, () => p1.mRight = false);
    drawBtn(this, 85, 340, '↑', () => { if(p1.body.touching.down) p1.body.setVelocityY(-500) });
    drawBtn(this, 200, 400, 'ATK', () => combat(p1, p2, 'atk'));
    drawBtn(this, 270, 400, 'SKL', () => combat(p1, p2, 'skl'));

    // P2 Controls (Bottom Right) - Only if Mode 2
    if(mode === 2) {
        drawBtn(this, 750, 400, '→', () => p2.mRight = true, () => p2.mRight = false);
        drawBtn(this, 680, 400, '←', () => p2.mLeft = true, () => p2.mLeft = false);
        drawBtn(this, 715, 340, '↑', () => { if(p2.body.touching.down) p2.body.setVelocityY(-500) });
        drawBtn(this, 600, 400, 'ATK', () => combat(p2, p1, 'atk'));
        drawBtn(this, 530, 400, 'SKL', () => combat(p2, p1, 'skl'));
    }
}

function drawBtn(scene, x, y, label, down, up) {
    let b = scene.add.circle(x, y, 30, 0x555, 0.8).setInteractive().setDepth(100);
    scene.add.text(x, y, label).setOrigin(0.5).setDepth(101);
    b.on('pointerdown', down);
    if(up) { b.on('pointerup', up); b.on('pointerout', up); }
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    // Player 1 Input
    if (this.keys.A.isDown || p1.mLeft) p1.body.setVelocityX(-200);
    else if (this.keys.D.isDown || p1.mRight) p1.body.setVelocityX(200);
    else p1.body.setVelocityX(0);
    if (Phaser.Input.Keyboard.JustDown(this.keys.W) && p1.body.touching.down) p1.body.setVelocityY(-500);
    if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE)) combat(p1, p2, 'atk');
    if (Phaser.Input.Keyboard.JustDown(this.keys.F)) combat(p1, p2, 'skl');

    // Player 2 Input
    if (mode === 2) {
        if (this.keys.LEFT.isDown || p2.mLeft) p2.body.setVelocityX(-200);
        else if (this.keys.RIGHT.isDown || p2.mRight) p2.body.setVelocityX(200);
        else p2.body.setVelocityX(0);
        if (Phaser.Input.Keyboard.JustDown(this.keys.UP) && p2.body.touching.down) p2.body.setVelocityY(-500);
        if (Phaser.Input.Keyboard.JustDown(this.keys.ENTER)) combat(p2, p1, 'atk');
        if (Phaser.Input.Keyboard.JustDown(this.keys.P)) combat(p2, p1, 'skl');
    } else {
        // AI Logic
        let d = p2.x - p1.x;
        if (Math.abs(d) > 65) p2.body.setVelocityX(d > 0 ? -120 : 120);
        else { p2.body.setVelocityX(0); if(Math.random() > 0.98) combat(p2, p1, 'atk'); }
    }

    // Cooldown Bars (10 seconds = 10000ms)
    if(p1.cd > 0) p1.cd -= delta;
    if(p2.cd > 0) p2.cd -= delta;
    this.p1CD.width = (p1.cd / 10000) * 200;
    this.p2CD.width = (p2.cd / 10000) * 200;

    this.p1Bar.width = p1.hp * 2;
    this.p2Bar.width = p2.hp * 2;

    if(p1.hp <= 0 || p2.hp <= 0) {
        this.add.text(400, 200, p1.hp <= 0 ? "P2 WINS" : "P1 WINS", {fontSize: '48px'}).setOrigin(0.5);
        gameState = "END";
        setTimeout(() => location.reload(), 3000);
    }
}

function combat(a, t, type) {
    let d = Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y);
    if (type === 'atk' && d < 60) t.hp -= 5;
    if (type === 'skl' && a.cd <= 0) {
        a.cd = 10000; // 10s cooldown
        if (a.type === 'Swordman' && d < 100) t.hp -= 15;
        if (a.type === 'Gunman') { t.hp -= 20; } // Instant snipe for logic
        if (a.type === 'Bomber') { a.hp -= 5; if(d < 120) t.hp -= 15; }
        if (a.type === 'Digger') { a.alpha = 0.5; setTimeout(()=>a.alpha=1, 3000); }
    }
}

function createBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#333', padding: 10 }).setOrigin(0.5).setInteractive().on('pointerdown', cb);
}
</script>
</body>
</html>
