<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Fight</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<script>
/** * GAME CONFIGURATION
 * We use a larger internal resolution for smoother physics 
 */
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    backgroundColor: '#1a1a1a',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 5 },
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1500 }, debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// Global Variables
let p1, p2, projectiles, explosions, uiLayer, timerText;
let matchTimer = 90;
let gameState = 'MENU';
let mode = 1; // 1 = CPU, 2 = PVP
let p1Type = 'Swordman';
let p2Type = 'Wizard';

const HP_TABLE = { 
    Swordman: 120, Wizard: 80, Bomber: 100, 
    Digger: 90, Engineer: 110, Freezer: 100, 
    Ghost: 180, Reaper: 160 
};

function preload() {
    // We are using procedural shapes for stickmen to keep it lightweight but unique
}

function create() {
    projectiles = this.physics.add.group();
    explosions = this.add.group();
    showMainMenu.call(this);
}

// --- UI SYSTEMS ---

function showMainMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    
    this.add.text(425, 120, 'STICKMAN: JUJUTSU SENDAI', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    
    createMenuButton(this, 425, 250, '1 PLAYER (VS AI)', () => { 
        mode = 1; 
        showCharacterSelect.call(this, 1); 
    });
    
    createMenuButton(this, 425, 330, '2 PLAYERS (LOCAL)', () => { 
        mode = 2; 
        showCharacterSelect.call(this, 1); 
    });
}

function showCharacterSelect(pNum) {
    this.children.removeAll();
    const title = pNum === 1 ? "P1: SELECT SORCERER" : "P2: SELECT SORCERER";
    this.add.text(425, 50, title, { fontSize: '32px', color: pNum === 1 ? '#00ff00' : '#ff0000' }).setOrigin(0.5);

    const list = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];
    list.forEach((name, i) => {
        createMenuButton(this, 425, 110 + (i * 45), name, () => {
            if(pNum === 1) {
                p1Type = name;
                if(mode === 2) showCharacterSelect.call(this, 2);
                else { p2Type = 'Random'; startMatch.call(this); }
            } else {
                p2Type = name;
                startMatch.call(this);
            }
        });
    });

    createMenuButton(this, 425, 410, '?? RANDOM ??', () => {
        if(pNum === 1) {
            p1Type = 'Random';
            if(mode === 2) showCharacterSelect.call(this, 2);
            else { p2Type = 'Random'; startMatch.call(this); }
        } else {
            p2Type = 'Random';
            startMatch.call(this);
        }
    }, '#4a0080');
}

function createMenuButton(scene, x, y, text, callback, color = '#333') {
    const btn = scene.add.container(x, y);
    const bg = scene.add.rectangle(0, 0, 300, 40, 0x000000).setStrokeStyle(2, 0xffffff);
    const txt = scene.add.text(0, 0, text, { fontSize: '20px', color: '#fff' }).setOrigin(0.5);
    
    bg.setInteractive({ useHandCursor: true })
      .on('pointerover', () => bg.setFillStyle(0x444444))
      .on('pointerout', () => bg.setFillStyle(0x000000))
      .on('pointerdown', callback);
      
    btn.add([bg, txt]);
    return btn;
}

// --- GAMEPLAY CORE ---

function rollCharacter(selection) {
    if (selection !== 'Random') return selection;
    const r = Math.random();
    if (r < 0.05) return 'Ghost'; // Ultra Rare Ryu
    if (r < 0.20) return 'Reaper'; // Rare Yuta
    const standard = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];
    return standard[Math.floor(Math.random() * standard.length)];
}

function startMatch() {
    this.children.removeAll();
    matchTimer = 90;
    
    // Resolve Randoms
    const char1 = rollCharacter(p1Type);
    let char2 = rollCharacter(p2Type);
    
    // Easter Egg: If both are Ryu/Yuta, ensure variety
    if (char1 === 'Ghost' && char2 === 'Ghost') char2 = 'Reaper';

    // World Building
    const ground = this.add.rectangle(425, 470, 850, 20, 0x333333);
    this.physics.add.existing(ground, true);

    p1 = spawnPlayer(this, 150, 400, char1, 1);
    p2 = spawnPlayer(this, 700, 400, char2, 2);

    this.physics.add.collider([p1, p2], ground);
    
    // Projectile Collisions
    this.physics.add.overlap(projectiles, [p1, p2], (victim, bullet) => {
        if (bullet.owner === victim.id) return;
        
        // Engineer Shield Logic
        if (victim.shieldHits > 0 && !bullet.isBeam) {
            victim.shieldHits--;
            bullet.destroy();
            return;
        }

        const dmg = bullet.damage || 15;
        applyDamage(victim, dmg, bullet.isBeam);
        if (!bullet.isBeam) bullet.destroy();
    });

    // UI Bars
    this.p1HP = this.add.rectangle(20, 30, 250, 15, 0x00ff00).setOrigin(0);
    this.p2HP = this.add.rectangle(830, 30, 250, 15, 0xff0000).setOrigin(1, 0);
    timerText = this.add.text(425, 35, '90', { fontSize: '32px', fontStyle: 'bold' }).setOrigin(0.5);

    setupControls(this);
    gameState = 'PLAYING';
}

function spawnPlayer(scene, x, y, type, id) {
    const container = scene.add.container(x, y);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70).setOffset(-20, -35);

    // Visuals
    const isSpecial = (type === 'Ghost' || type === 'Reaper');
    const color = isSpecial ? 0xffffff : (id === 1 ? 0x00ff00 : 0xff0000);
    
    const head = scene.add.circle(0, -25, 15, color);
    const body = scene.add.rectangle(0, 5, 10, 40, color);
    const weapon = scene.add.container(20, 0);
    
    // Character Specific Accessories
    if (type === 'Ghost') { // Ryu
        const hair = scene.add.rectangle(15, -35, 30, 12, 0x000000).setOrigin(0, 0.5);
        container.add(hair);
        weapon.setVisible(false); // Ryu is a brawler
    } else if (type === 'Reaper') { // Yuta
        const katana = scene.add.rectangle(0, 0, 50, 4, 0xeeeeee);
        const guard = scene.add.rectangle(-20, 0, 4, 15, 0x333333);
        weapon.add([katana, guard]);
    } else if (type === 'Wizard') {
        const staff = scene.add.rectangle(0, 0, 6, 60, 0x5d3a1a);
        const orb = scene.add.circle(0, -30, 10, 0xff0000);
        weapon.add([staff, orb]);
    } else if (type === 'Digger') {
        const pick = scene.add.rectangle(0, 0, 4, 40, 0x444);
        const head = scene.add.rectangle(0, -20, 30, 6, 0x777);
        weapon.add([pick, head]);
    } else {
        const sword = scene.add.rectangle(0, 0, 40, 6, 0xcccccc);
        weapon.add(sword);
    }

    container.add([head, body, weapon]);
    
    // Stats & State
    container.id = id;
    container.type = type;
    container.hp = HP_TABLE[type];
    container.maxHp = HP_TABLE[type];
    container.facing = id === 1 ? 1 : -1;
    container.atkCD = 0;
    container.skillCD = 0;
    container.shieldHits = 0;
    container.isStealth = false;
    container.isStunned = false;

    // Visual Layers for Skills
    container.rika = scene.add.circle(-40, -50, 35, 0x222222, 0.5).setVisible(false);
    container.shieldObj = scene.add.circle(0, 0, 60, 0x00ffff, 0.2).setStrokeStyle(2, 0x00ffff).setVisible(false);
    container.iceBlock = scene.add.rectangle(0, 0, 70, 100, 0x00ffff, 0.4).setVisible(false);
    
    container.add([container.rika, container.shieldObj, container.iceBlock]);

    return container;
}

// --- MECHANICS ---

function applyDamage(target, amount, isBeam = false) {
    if (target.isStealth) { target.isStealth = false; target.alpha = 1; }
    
    const finalDmg = target.isBlocking ? amount * 0.2 : amount;
    target.hp -= finalDmg;
    
    // Flash effect
    target.scene.tweens.add({ targets: target, alpha: 0.5, duration: 50, yoyo: true });
}

function handleAttack(p, t) {
    if (p.atkCD > 0 || p.isStunned || gameState !== 'PLAYING') return;
    p.atkCD = 450;

    // Animation
    p.scene.tweens.add({
        targets: p.list[2], 
        angle: p.facing * 90, 
        duration: 100, 
        yoyo: true 
    });

    const dist = Phaser.Math.Distance.Between(p.x, p.y, t.x, t.y);
    if (dist < 90) {
        if (t.shieldHits > 0) {
            t.shieldHits--;
            return;
        }

        if (p.isStealth) {
            p.isStealth = false;
            p.alpha = 1;
            applyStun(t, 3000); // 3 second stun
            applyDamage(t, 25);
        } else {
            let dmg = 12;
            if (p.type === 'Reaper' && p.hp < p.maxHp/2) dmg = 22; // Rika power
            applyDamage(t, dmg);
        }
    }
}

function handleSkill(p, t) {
    if (p.skillCD > 0 || p.isStunned || gameState !== 'PLAYING') return;
    p.skillCD = 8000;

    const scene = p.scene;

    if (p.type === 'Digger') {
        p.isStealth = true;
        p.alpha = 0.3;
    } 
    else if (p.type === 'Engineer') {
        p.shieldHits = 3;
    }
    else if (p.type === 'Bomber') {
        const bomb = scene.add.circle(p.x, p.y, 12, 0x000000);
        scene.physics.add.existing(bomb);
        bomb.body.setVelocity(p.facing * 400, -500);
        
        scene.time.delayedCall(1500, () => {
            const explosion = scene.add.circle(bomb.x, bomb.y, 150, 0xff6600, 0.6);
            const dist = Phaser.Math.Distance.Between(bomb.x, bomb.y, t.x, t.y);
            if (dist < 160) {
                applyDamage(t, 40);
                const angle = Phaser.Math.Angle.Between(bomb.x, bomb.y, t.x, t.y);
                t.body.setVelocity(Math.cos(angle) * 1000, -600);
            }
            bomb.destroy();
            scene.tweens.add({ targets: explosion, scale: 2, alpha: 0, duration: 500, onComplete: () => explosion.destroy() });
        });
    }
    else if (p.type === 'Wizard') {
        const fire = scene.add.circle(p.x, p.y, 20, 0xff4400);
        scene.physics.add.existing(fire);
        fire.body.setAllowGravity(false).setVelocityX(p.facing * 500);
        fire.owner = p.id;
        fire.damage = 25;
        projectiles.add(fire);
    }
    else if (p.type === 'Ghost' || (p.type === 'Reaper' && p.hp < p.maxHp/2)) {
        // Granite Blast / Love Beam
        const beamColor = p.type === 'Ghost' ? 0x00ffff : 0xff00ff;
        const beam = scene.add.rectangle(0, 0, 900, 50, beamColor, 0.7);
        scene.physics.add.existing(beam);
        beam.body.setAllowGravity(false);
        beam.owner = p.id;
        beam.isBeam = true;
        beam.damage = 2; // Tick damage
        beam.launcher = p;
        projectiles.add(beam);
        scene.time.delayedCall(1800, () => beam.destroy());
    }
}

function applyStun(target, duration) {
    target.isStunned = true;
    target.iceBlock.setVisible(true);
    target.body.setVelocity(0, 0);
    target.scene.time.delayedCall(duration, () => {
        target.isStunned = false;
        target.iceBlock.setVisible(false);
    });
}

// --- LOOP & UI ---

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    matchTimer -= delta / 1000;
    timerText.setText(Math.ceil(matchTimer));

    [p1, p2].forEach(p => {
        p.atkCD -= delta;
        p.skillCD -= delta;
        p.shieldObj.setVisible(p.shieldHits > 0);

        if (!p.isStunned) {
            let vx = 0;
            // Input Logic
            if (p.id === 1) {
                if (p.mLeft) vx = -250;
                if (p.mRight) vx = 250;
                if (p.mJump && p.body.touching.down) p.body.setVelocityY(-700);
            } else {
                if (mode === 2) {
                    if (p.mLeft) vx = -250;
                    if (p.mRight) vx = 250;
                    if (p.mJump && p.body.touching.down) p.body.setVelocityY(-700);
                } else runAI(p, p1);
            }
            
            if (p.mBlock) vx = 0;
            p.body.setVelocityX(vx);
            
            if (vx !== 0) {
                p.facing = vx > 0 ? 1 : -1;
                p.list[2].scaleX = p.facing;
                p.list[2].x = 20 * p.facing;
            }
        }
    });

    // Beam Following
    projectiles.getChildren().forEach(proj => {
        if (proj.isBeam) {
            proj.y = proj.launcher.y;
            proj.x = proj.launcher.x + (450 * proj.launcher.facing);
        }
    });

    // Health Bars
    this.p1HP.width = (p1.hp / p1.maxHp) * 250;
    this.p2HP.width = (p2.hp / p2.maxHp) * 250;

    if (p1.hp <= 0 || p2.hp <= 0 || matchTimer <= 0) {
        const winner = p1.hp > p2.hp ? "PLAYER 1" : "PLAYER 2";
        endGame.call(this, winner);
    }
}

function setupControls(scene) {
    const createBtn = (x, y, label, callbackDown, callbackUp) => {
        const c = scene.add.circle(x, y, 40, 0xffffff, 0.2).setInteractive().setDepth(1000);
        scene.add.text(x, y, label).setOrigin(0.5).setDepth(1001);
        c.on('pointerdown', () => callbackDown(true));
        c.on('pointerup', () => callbackUp(false));
        c.on('pointerout', () => callbackUp(false));
    };

    // P1 Controls (Left Side)
    createBtn(60, 420, 'L', v => p1.mLeft = v, v => p1.mLeft = v);
    createBtn(150, 420, 'R', v => p1.mRight = v, v => p1.mRight = v);
    createBtn(105, 340, 'J', v => p1.mJump = v, v => p1.mJump = v);
    createBtn(260, 420, 'A', v => { if(v) handleAttack(p1, p2) }, v => {});
    createBtn(350, 420, 'S', v => { if(v) handleSkill(p1, p2) }, v => {});
    createBtn(305, 340, 'B', v => p1.mBlock = v, v => p1.mBlock = v);

    // P2 Controls (Right Side - Only if PvP)
    if (mode === 2) {
        createBtn(790, 420, 'R', v => p2.mRight = v, v => p2.mRight = v);
        createBtn(700, 420, 'L', v => p2.mLeft = v, v => p2.mLeft = v);
        createBtn(745, 340, 'J', v => p2.mJump = v, v => p2.mJump = v);
        createBtn(590, 420, 'A', v => { if(v) handleAttack(p2, p1) }, v => {});
        createBtn(500, 420, 'S', v => { if(v) handleSkill(p2, p1) }, v => {});
        createBtn(545, 340, 'B', v => p2.mBlock = v, v => p2.mBlock = v);
    }
}

function runAI(c, t) {
    const dist = Math.abs(c.x - t.x);
    if (c.isStunned) return;

    if (dist > 120) {
        c.mLeft = c.x > t.x;
        c.mRight = c.x < t.x;
    } else {
        c.mLeft = false; c.mRight = false;
        handleAttack(c, t);
        if (c.skillCD <= 0) handleSkill(c, t);
    }
    
    if (t.y < c.y - 50 && c.body.touching.down) c.mJump = true; else c.mJump = false;
}

function endGame(winner) {
    gameState = 'FINISHED';
    this.physics.pause();
    
    const overlay = this.add.rectangle(425, 240, 850, 480, 0x000000, 0.8).setDepth(2000);
    this.add.text(425, 200, winner + " WINS", { fontSize: '64px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setDepth(2001);
    
    const restart = this.add.text(425, 300, 'CLICK TO RESTART', { fontSize: '24px', color: '#aaa' }).setOrigin(0.5).setDepth(2001);
    overlay.setInteractive().on('pointerdown', () => location.reload());
}

</script>
</body>
</html>
