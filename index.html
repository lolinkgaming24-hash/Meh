<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Freezer Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 10 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, gameState = 'MENU', mode = 1;
let selections = { p1: 'Wizard', p2: 'Wizard' };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 80 + (i * 45), name, () => { selections.p1 = name; handleP1Choice.call(this); });
    });
}

function handleP1Choice() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 80 + (i * 45), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function getRandomChar() {
    return Math.random() < 0.15 ? 'Ghost' : CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    
    let char1 = (selections.p1 === 'Random') ? getRandomChar() : selections.p1;
    let char2 = (selections.p2 === 'Random') ? getRandomChar() : selections.p2;

    p1 = createChar(this, 200, 300, 0x00ff00, char1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, char2, 2);
    
    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);
    this.physics.add.collider([p1, p2], ground);

    this.physics.add.overlap(projectiles, [p1, p2], (char, proj) => {
        if (proj.owner !== char.id) {
            if (proj.isGhostBeam) {
                dealDamage(proj.launcher, char, char.isBlocking ? 0.12 : 0.45, false);
            } else if (proj.isFreezeWave) {
                applyFreeze(char, 3000);
            } else if (!proj.isBomb) {
                dealDamage(proj.launcher, char, char.isBlocking ? 5 : 15);
                proj.destroy();
            }
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p1Skl = this.add.rectangle(20, 48, 200, 8, 0x00ffff).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);
    this.p2Skl = this.add.rectangle(830, 48, 200, 8, 0x00ffff).setOrigin(1, 0);

    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN,SHIFT,SPACE');
    gameState = 'PLAYING';
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let c = (type === 'Ghost') ? 0xaaaaaa : (type === 'Freezer' ? 0x88ccff : color);
    let weapon = scene.add.rectangle(20, 0, 30, 6, 0xccc).setOrigin(0, 0.5);
    
    container.add([scene.add.circle(0, -25, 15, c), scene.add.rectangle(0, 5, 8, 40, c), weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);
    
    container.hp = 100; container.type = type; container.id = id;
    container.maxSkl = (type === 'Ghost' ? 14000 : (type === 'Freezer' ? 10000 : 8500)); 
    container.skillCD = 0; container.atkCD = 0; 
    container.isStunned = false; container.isBlocking = false; container.isChannelling = false; 
    container.facing = (id === 1 ? 1 : -1);
    
    container.shieldHits = 0;
    container.isInvisible = false;
    container.indicator = scene.add.text(0, -60, '▼', {color: '#ffff00', fontSize: '20px'}).setOrigin(0.5).setAlpha(0);
    container.shieldGraphic = scene.add.circle(0, 0, 45, 0x00ffff, 0.2).setAlpha(0);
    container.add([container.indicator, container.shieldGraphic]);

    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;
    
    p1.isBlocking = (this.keys.SHIFT.isDown || p1.mBlock);
    processMove(p1, this.keys.A, this.keys.D);
    if(this.keys.W.isDown && p1.body.touching.down) p1.body.setVelocityY(-600);

    if(mode === 2) { 
        p2.isBlocking = (this.keys.SPACE.isDown || p2.mBlock); 
        processMove(p2, this.keys.LEFT, this.keys.RIGHT); 
        if(this.keys.UP.isDown && p2.body.touching.down) p2.body.setVelocityY(-600);
    } else processAI(p2, p1);

    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.alpha = p.isInvisible ? 0.2 : 1.0;
        p.indicator.setAlpha(p.isInvisible ? 1 : 0);
        p.shieldGraphic.setAlpha(p.shieldHits > 0 ? 0.4 : 0);
        p.list[0].tint = p.isBlocking ? 0x00aaff : (p.isStunned ? 0x00ffff : 0xffffff);
    });

    this.p1Skl.width = (1 - (p1.skillCD / p1.maxSkl)) * 200;
    this.p2Skl.width = (1 - (p2.skillCD / p2.maxSkl)) * 200;
    this.p1Bar.width = Math.max(0, p1.hp) * 2;
    this.p2Bar.width = Math.max(0, p2.hp) * 2;

    projectiles.getChildren().forEach(proj => {
        if(proj.isGhostBeam) {
            proj.x = proj.launcher.x + (proj.launcher.facing * 400);
            proj.y = proj.launcher.y;
        } else if(proj.active && !proj.isBomb && !proj.isFreezeWave) {
            proj.x += proj.moveDir * proj.speed;
            if(proj.x < -300 || proj.x > 1150) proj.destroy();
        }
    });

    if(p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "PLAYER 2" : "PLAYER 1");
}

function processMove(p, l, r) {
    if (p.isStunned || p.isBlocking || p.isChannelling) { p.body.setVelocityX(0); return; }
    if (l?.isDown || p.mLeft) { p.body.setVelocityX(-220); p.facing = -1; p.list[2].scaleX = -1; p.list[2].x = -20; }
    else if (r?.isDown || p.mRight) { p.body.setVelocityX(220); p.facing = 1; p.list[2].scaleX = 1; p.list[2].x = 20; }
    else p.body.setVelocityX(0);
}

function handleCombat(a, t, type) {
    if (a.isStunned || a.isBlocking || a.isChannelling || gameState !== 'PLAYING') return; 

    if(type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 800;
        a.scene.tweens.add({ targets: a.list[2], angle: a.facing > 0 ? 90 : -90, duration: 150, yoyo: true });
        if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 100) {
            if(a.type === 'Freezer') {
                applyFreeze(t, 500); // 0.5s stun
                dealDamage(a, t, 5);
            } else if(a.isInvisible) {
                a.isInvisible = false;
                applyFreeze(t, 1500);
                dealDamage(a, t, 25);
            } else {
                dealDamage(a, t, t.isBlocking ? 3 : 10);
            }
        }
    }

    if(type === 'skl' && a.skillCD <= 0) {
        a.skillCD = a.maxSkl;
        if(a.type === 'Freezer') {
            let wave = a.scene.add.rectangle(a.x + (a.facing * 150), a.y, 300, 100, 0x00ffff, 0.4);
            a.scene.physics.add.existing(wave);
            wave.body.setAllowGravity(false);
            wave.owner = a.id; wave.launcher = a; wave.isFreezeWave = true; projectiles.add(wave);
            a.scene.time.delayedCall(300, () => wave.destroy());
        } else if(a.type === 'Ghost') {
            a.isChannelling = true;
            let glow = a.scene.add.rectangle(0, 0, 800, 160, 0x00ffff, 0.3).setDepth(3);
            let core = a.scene.add.rectangle(0, 0, 800, 40, 0xffffff, 0.8).setDepth(4);
            let beamGroup = a.scene.add.container(a.x + (a.facing * 400), a.y, [glow, core]);
            a.scene.physics.add.existing(beamGroup);
            beamGroup.body.setAllowGravity(false);
            beamGroup.owner = a.id; beamGroup.launcher = a; beamGroup.isGhostBeam = true; projectiles.add(beamGroup);
            a.scene.time.delayedCall(2500, () => { beamGroup.destroy(); a.isChannelling = false; });
        } else if(a.type === 'Wizard') {
            let ball = a.scene.add.circle(a.x, a.y, 18, 0xff4400);
            a.scene.physics.add.existing(ball); ball.body.setAllowGravity(false);
            ball.moveDir = a.facing; ball.owner = a.id; ball.launcher = a; ball.speed = 8; projectiles.add(ball);
        } else if(a.type === 'Digger') {
            a.isInvisible = true;
        } else if(a.type === 'Engineer') {
            a.shieldHits = 3;
        } else if(a.type === 'Bomber') {
            let bomb = a.scene.add.circle(a.x, a.y, 15, 0x333333);
            a.scene.physics.add.existing(bomb); bomb.body.setVelocity(a.facing * 350, -300);
            bomb.owner = a.id; bomb.launcher = a; bomb.isBomb = true; projectiles.add(bomb);
            a.scene.time.delayedCall(1200, () => {
                let exp = a.scene.add.circle(bomb.x, bomb.y, 100, 0xff6600, 0.6);
                if(Phaser.Math.Distance.Between(exp.x, exp.y, t.x, t.y) < 120) dealDamage(a, t, 40);
                bomb.destroy(); a.scene.tweens.add({targets: exp, scale: 2, alpha: 0, duration: 300, onComplete: () => exp.destroy()});
            });
        }
    }
}

function applyFreeze(t, dur) {
    if(t.isStunned) return;
    t.isStunned = true;
    let ice = t.scene.add.rectangle(t.x, t.y, 60, 80, 0x00ffff, 0.5);
    t.scene.time.delayedCall(dur, () => { t.isStunned = false; ice.destroy(); });
}

function dealDamage(a, t, d, fx=true) {
    if(t.shieldHits > 0 && d > 1) { 
        t.shieldHits--;
        return;
    }
    t.hp -= d; 
    if(fx && Math.random() > 0.5) { 
        let s = a.scene.add.circle(t.x, t.y, 20, 0xffffff, 0.5); 
        a.scene.tweens.add({targets: s, alpha:0, scale:2, duration:200, onComplete:()=>s.destroy()}); 
    } 
}

function setupMobileControls() {
    drawBtn(this, 60, 400, '←', (v)=>p1.mLeft=v); drawBtn(this, 160, 400, '→', (v)=>p1.mRight=v);
    drawBtn(this, 110, 310, '↑', (v)=>{ if(v && p1.body.touching.down) p1.body.setVelocityY(-600)});
    drawBtn(this, 260, 410, 'ATK', (v)=>{ if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(this, 350, 410, 'SKL', (v)=>{ if(v) handleCombat(p1, p2, 'skl') });
    drawBtn(this, 305, 330, 'BLK', (v)=>p1.mBlock=v);
    if(mode === 2) {
        drawBtn(this, 490, 410, 'SKL', (v)=>{ if(v) handleCombat(p2, p1, 'skl') });
        drawBtn(this, 580, 410, 'ATK', (v)=>{ if(v) handleCombat(p2, p1, 'atk') });
        drawBtn(this, 535, 330, 'BLK', (v)=>p2.mBlock=v);
        drawBtn(this, 680, 400, '←', (v)=>p2.mLeft=v); drawBtn(this, 780, 400, '→', (v)=>p2.mRight=v);
        drawBtn(this, 730, 310, '↑', (v)=>{ if(v && p2.body.touching.down) p2.body.setVelocityY(-600)});
    }
}

function drawBtn(scene, x, y, label, cb) {
    let b = scene.add.circle(x, y, 35, 0xffffff, 0.2).setInteractive().setDepth(100);
    scene.add.text(x, y, label).setOrigin(0.5).setDepth(101);
    b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
}

function createMenuBtn(scene, x, y, txt, cb) { return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 10 }).setOrigin(0.5).setInteractive().on('pointerdown', cb); }

function endGame(w) { gameState = 'END'; this.physics.pause(); this.add.text(425, 200, w + " WINS", {fontSize:'60px'}).setOrigin(0.5); createMenuBtn(this, 425, 300, 'REMATCH', () => startMatch.call(this)); }

function processAI(c, t) {
    if(c.isChannelling || c.isStunned) return;
    let d = Math.abs(c.x - t.x);
    if(d > 150) c.body.setVelocityX(c.x > t.x ? -150 : 150); else c.body.setVelocityX(0);
    c.facing = c.x > t.x ? -1 : 1;
    if(c.skillCD <= 0 && d < 250) handleCombat(c, t, 'skl');
    if(c.atkCD <= 0 && d < 100) handleCombat(c, t, 'atk');
}
</script>
</body>
</html>
