<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, ground, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#111');
    showMenu.call(this);
}

function showMenu() {
    this.children.removeAll();
    this.add.text(400, 100, 'STICKMAN BRAWLER', { fontSize: '42px', color: '#fff' }).setOrigin(0.5);
    createBtn(this, 400, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createBtn(this, 400, 300, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(400, 50, 'PLAYER 1: SELECT CLASS', { fontSize: '24px', color: '#0f0' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createBtn(this, 400, 120 + (i * 55), name, () => {
            selections.p1 = name;
            if (mode === 2) selectP2.call(this);
            else { selections.p2 = classes[Math.floor(Math.random()*5)]; startMatch.call(this); }
        });
    });
}

function selectP2() {
    this.children.removeAll();
    const classes = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];
    this.add.text(400, 50, 'PLAYER 2: SELECT CLASS', { fontSize: '24px', color: '#f00' }).setOrigin(0.5);
    classes.forEach((name, i) => {
        createBtn(this, 400, 120 + (i * 55), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function startMatch() {
    this.children.removeAll();
    ground = this.add.rectangle(400, 440, 2000, 40, 0x333);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 150, 300, 0x00ff00, selections.p1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, selections.p2, 2);
    
    this.physics.add.collider(p1, ground);
    this.physics.add.collider(p2, ground);

    this.p1Bar = this.add.rectangle(20, 20, 200, 15, 0x00ff00).setOrigin(0).setScrollFactor(0);
    this.p2Bar = this.add.rectangle(780, 20, 200, 15, 0xff0000).setOrigin(1, 0).setScrollFactor(0);

    setupMobileControls.call(this);

    let count = 3;
    let txt = this.add.text(400, 200, '3', { fontSize: '64px' }).setOrigin(0.5);
    let timer = setInterval(() => {
        count--;
        txt.setText(count > 0 ? count : 'FIGHT!');
        if(count < 0) { txt.destroy(); gameState = 'PLAYING'; clearInterval(timer); }
    }, 1000);

    this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE,F,Q');
}

function createChar(scene, x, y, color, type, id) {
    let c = scene.add.container(x, y);
    c.add([scene.add.circle(0, -15, 12, color), scene.add.rectangle(0, 10, 4, 30, color)]);
    scene.physics.add.existing(c);
    c.body.setCollideWorldBounds(true).setSize(30, 50);
    c.hp = 100; c.type = type; c.id = id; c.isBlocking = false;
    return c;
}

function setupMobileControls() {
    const viewW = 800;
    const viewH = 450;

    // P1 CONTROLS (Left side)
    drawButton(this, 60, viewH - 60, '←', () => p1.mLeft = true, () => p1.mLeft = false);
    drawButton(this, 140, viewH - 60, '→', () => p1.mRight = true, () => p1.mRight = false);
    drawButton(this, 100, viewH - 130, '↑', () => { if(p1.body.touching.down) p1.body.setVelocityY(-500) });
    drawButton(this, 220, viewH - 60, 'ATK', () => combat(p1, p2, 'atk'));
    drawButton(this, 300, viewH - 60, 'SKL', () => combat(p1, p2, 'skl'));
    drawButton(this, 260, viewH - 130, 'BLK', () => p1.isBlocking = true, () => p1.isBlocking = false);

    // P2 CONTROLS (Right side) - Only if 2 Player mode
    if(mode === 2) {
        drawButton(this, viewW - 140, viewH - 60, '←', () => p2.mLeft = true, () => p2.mLeft = false);
        drawButton(this, viewW - 60, viewH - 60, '→', () => p2.mRight = true, () => p2.mRight = false);
        drawButton(this, viewW - 100, viewH - 130, '↑', () => { if(p2.body.touching.down) p2.body.setVelocityY(-500) });
        drawButton(this, viewW - 220, viewH - 60, 'ATK', () => combat(p2, p1, 'atk'));
        drawButton(this, viewW - 300, viewH - 60, 'SKL', () => combat(p2, p1, 'skl'));
        drawButton(this, viewW - 260, viewH - 130, 'BLK', () => p2.isBlocking = true, () => p2.isBlocking = false);
    }
}

function drawButton(scene, x, y, label, downFn, upFn) {
    let circle = scene.add.circle(x, y, 35, 0xffffff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
    scene.add.text(x, y, label, { fontSize: '18px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(101);
    circle.on('pointerdown', downFn);
    if(upFn) {
        circle.on('pointerup', upFn);
        circle.on('pointerout', upFn);
    }
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    // Movement P1
    if (!p1.isBlocking) {
        if (this.keys.A.isDown || p1.mLeft) p1.body.setVelocityX(-200);
        else if (this.keys.D.isDown || p1.mRight) p1.body.setVelocityX(200);
        else p1.body.setVelocityX(0);
    } else { p1.body.setVelocityX(0); }

    // Movement P2 (AI or Player)
    if (mode === 1) {
        let d = p2.x - p1.x;
        let ideal = p2.type === 'Gunman' ? 250 : 60;
        if (Math.abs(d) > ideal) p2.body.setVelocityX(d > 0 ? -120 : 120);
        else { p2.body.setVelocityX(0); if(Math.random() > 0.98) combat(p2, p1, 'atk'); }
    } else if (!p2.isBlocking) {
        if (p2.mLeft) p2.body.setVelocityX(-200);
        else if (p2.mRight) p2.body.setVelocityX(200);
        else p2.body.setVelocityX(0);
    } else { p2.body.setVelocityX(0); }

    this.p1Bar.width = p1.hp * 2;
    this.p2Bar.width = p2.hp * 2;

    let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
    this.cameras.main.setZoom(Phaser.Math.Clamp(1.2 - (dist/900), 0.7, 1.1));
    this.cameras.main.centerOn((p1.x + p2.x)/2, (p1.y + p2.y)/2);
}

function combat(a, t, type) {
    if (a.isBlocking) return; // Cannot attack while blocking
    if (t.isBlocking) return; // Damage is 0 if target is blocking

    let dist = Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y);
    
    if (a.type === 'Gunman') {
        let range = 400;
        let bullet = a.scene.add.rectangle(a.x, a.y, 15, 3, 0xffff00);
        let direction = t.x > a.x ? 1 : -1;
        a.scene.tweens.add({
            targets: bullet,
            x: a.x + (range * direction),
            alpha: 0, duration: 300, onComplete: () => bullet.destroy()
        });

        if (dist < range) {
            if (type === 'atk') t.hp -= 5;
            if (type === 'skl') { t.hp -= 15; a.body.setVelocityY(-200); }
        }
    } else {
        if (type === 'atk' && dist < 60) t.hp -= 5;
        if (type === 'skl' && dist < 100) { t.hp -= 15; a.body.setVelocityY(-200); }
    }
}

function createBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#333', padding: 10 })
        .setOrigin(0.5).setInteractive().on('pointerdown', cb);
}
</script>
</body>
</html>
