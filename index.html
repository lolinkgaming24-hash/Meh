<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 5 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p1 = name; handleP1Choice.call(this); });
    });
}

function handleP1Choice() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    
    let char1 = selections.p1 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p1;
    let char2 = selections.p2 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p2;

    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 200, 300, 0x00ff00, char1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, char2, 2);
    
    this.physics.add.collider([p1, p2], ground);
    
    this.physics.add.overlap(projectiles, [p1, p2], (char, projectile) => {
        if (projectile.owner !== char.id) {
            if (projectile.isFireball) {
                // Fireball logic: 20 dmg + Stun + Pillar effect
                dealDamage(projectile.launcher, char, 20, 40);
                char.isStunned = true;
                projectile.scene.time.delayedCall(1500, () => char.isStunned = false);
                // Pillar of Fire FX
                let pillar = projectile.scene.add.rectangle(char.x, char.y, 40, 100, 0xff4400, 0.6);
                projectile.scene.tweens.add({ targets: pillar, alpha: 0, scaleX: 1.5, duration: 600, onComplete: () => pillar.destroy() });
            } else {
                dealDamage(projectile.launcher, char, 8, 15);
            }
            projectile.destroy();
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p1CD = this.add.rectangle(20, 50, 0, 6, 0xffff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);
    this.p2CD = this.add.rectangle(830, 50, 0, 6, 0xffff00).setOrigin(1, 0);

    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN');
    
    gameState = 'PLAYING';
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let head = scene.add.circle(0, -25, 15, color);
    let body = scene.add.rectangle(0, 5, 8, 40, color);
    let weapon;
    
    if(type === 'Swordman') weapon = scene.add.rectangle(20, 0, 45, 8, 0xccc).setOrigin(0, 0.5);
    else if(type === 'Wizard') {
        weapon = scene.add.container(20, 0);
        let staff = scene.add.rectangle(0, 0, 8, 50, 0x8b4513).setAngle(45);
        let gem = scene.add.circle(18, -18, 6, 0xffd700);
        weapon.add([staff, gem]);
    }
    else if(type === 'Bomber') weapon = scene.add.circle(20, 0, 12, 0x222);
    else if(type === 'Digger') weapon = scene.add.rectangle(20, 0, 30, 6, 0x8b4513).setOrigin(0, 0.5);
    else weapon = scene.add.rectangle(20, 0, 20, 20, 0xffaa00).setOrigin(0, 0.5);

    container.add([head, body, weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70).setDragX(800);
    
    container.hp = 100; container.type = type; container.id = id;
    container.skillCD = 0; container.atkCD = 0; container.shieldHits = 0;
    container.isBlocking = false; container.blockStamina = 100; 
    container.isShattered = false; container.isStunned = false;
    container.facing = (id === 1 ? 1 : -1);
    return container;
}

function handleCombat(a, t, type) {
    if (a.isBlocking || a.isShattered || a.isStunned || gameState !== 'PLAYING') return; 

    if(type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 650;
        a.scene.tweens.add({ targets: a.list[2], angle: a.facing > 0 ? 80 : -80, duration: 100, yoyo: true });
        let dist = Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y);
        if(dist < 95) dealDamage(a, t, 10, 25);
    }

    if(type === 'skl' && a.skillCD <= 0) {
        a.skillCD = 10000;
        if(a.type === 'Wizard') {
            spawnFireball(a);
        } else if(a.type === 'Engineer') a.shieldHits = 3;
        else if(a.type === 'Digger') { a.isStealth = true; a.scene.time.delayedCall(3000, () => a.isStealth = false); }
        else if(a.type === 'Bomber') {
            spawnFX(a.scene, a.x, a.y, 0xff4400, 100);
            if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 160) dealDamage(a, t, 20, 50);
        } else {
            if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 160) dealDamage(a, t, 18, 50);
            spawnFX(a.scene, a.x, a.y, 0xffff00, 80);
        }
    }
}

function spawnFireball(a) {
    let ball = a.scene.add.circle(a.x + (a.facing * 40), a.y, 15, 0xff6600);
    a.scene.physics.add.existing(ball);
    ball.body.setAllowGravity(false).setVelocityX(a.facing * 200); // SLOW move
    ball.owner = a.id; ball.launcher = a; ball.isFireball = true;
    projectiles.add(ball);

    // Fire Trail
    a.scene.time.addEvent({
        delay: 50,
        repeat: 40,
        callback: () => {
            if(ball.active) {
                let p = a.scene.add.circle(ball.x, ball.y, 8, 0xff4400, 0.5);
                a.scene.tweens.add({ targets: p, alpha: 0, scale: 0.5, duration: 400, onComplete: ()=>p.destroy() });
            }
        }
    });
}

function dealDamage(a, t, dmg, stamDmg) {
    if (t.isBlocking) {
        t.blockStamina -= stamDmg; t.hp -= (dmg * 0.2);
        if (t.blockStamina <= 0) {
            t.isShattered = true; t.isBlocking = false;
            a.scene.time.delayedCall(1500, () => { t.isShattered = false; t.blockStamina = 50; });
        }
    } else {
        if(t.shieldHits > 0) t.shieldHits--; else t.hp -= dmg;
    }
    spawnFX(a.scene, t.x, t.y, 0xffffff);
}

function spawnFX(scene, x, y, color, size=20) {
    let s = scene.add.circle(x, y, size, color, 0.4);
    scene.tweens.add({ targets: s, alpha: 0, scale: 2, duration: 300, onComplete: ()=>s.destroy() });
}

function processMove(p, l, r) {
    if (p.isShattered || p.isStunned) { p.body.setVelocityX(0); return; }
    let speed = p.isBlocking ? 100 : 220;
    if (l?.isDown || p.mLeft) { p.body.setVelocityX(-speed); p.list[2].x = -20; p.list[2].scaleX = -1; p.facing = -1; }
    else if (r?.isDown || p.mRight) { p.body.setVelocityX(speed); p.list[2].x = 20; p.list[2].scaleX = 1; p.facing = 1; }
    else p.body.setVelocityX(0);
}

function processAI(cpu, target) {
    if (cpu.isStunned) return;
    let dist = Math.abs(cpu.x - target.x);
    let ideal = cpu.type === 'Wizard' ? 250 : 70;
    if (dist > ideal + 20) cpu.body.setVelocityX(cpu.x > target.x ? -160 : 160);
    else if (dist < ideal - 20) cpu.body.setVelocityX(cpu.x > target.x ? 160 : -160);
    else cpu.body.setVelocityX(0);
    cpu.facing = cpu.x > target.x ? -1 : 1;
    cpu.list[2].x = cpu.facing * 20; cpu.list[2].scaleX = cpu.facing;
    if (cpu.skillCD <= 0 && dist < 500) handleCombat(cpu, target, 'skl');
    if (cpu.atkCD <= 0 && dist < 100) handleCombat(cpu, target, 'atk');
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;
    processMove(p1, this.keys.A, this.keys.D);
    if(mode === 2) processMove(p2, this.keys.LEFT, this.keys.RIGHT); else processAI(p2, p1);
    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.list[0].tint = (p.isShattered || p.isStunned) ? 0xffaa00 : (p.isBlocking ? 0x00aaff : 0xffffff);
    });
    this.p1CD.width = (p1.skillCD / 10000) * 200;
    this.p2CD.width = (p2.skillCD / 10000) * 200;
    this.p1Bar.width = Math.max(0, p1.hp) * 2;
    this.p2Bar.width = Math.max(0, p2.hp) * 2;
    if(p1.hp <= 0 || p2.hp <= 0) { alert(p1.hp <= 0 ? "P2 Wins!" : "P1 Wins!"); location.reload(); }
}

function setupMobileControls() {
    drawBtn(this, 70, 400, '←', (v)=>p1.mLeft=v);
    drawBtn(this, 210, 400, '→', (v)=>p1.mRight=v);
    drawBtn(this, 140, 310, '↑', (v)=>{ if(v && p1.body.touching.down) p1.body.setVelocityY(-600)});
    drawBtn(this, 780, 390, 'ATK', (v)=>{ if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(this, 670, 400, 'SKL', (v)=>{ if(v) handleCombat(p1, p2, 'skl') });
    drawBtn(this, 725, 300, 'BLK', (v)=>p1.isBlocking=v);
    if(mode === 2) {
        drawBtn(this, 70, 80, '←', (v)=>p2.mLeft=v);
        drawBtn(this, 210, 80, '→', (v)=>p2.mRight=v);
        drawBtn(this, 140, 160, '↑', (v)=>{ if(v && p2.body.touching.down) p2.body.setVelocityY(-600)});
        drawBtn(this, 780, 90, 'ATK', (v)=>{ if(v) handleCombat(p2, p1, 'atk') });
        drawBtn(this, 670, 80, 'SKL', (v)=>{ if(v) handleCombat(p2, p1, 'skl') });
        drawBtn(this, 725, 180, 'BLK', (v)=>p2.isBlocking=v);
    }
}

function createMenuBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 12, color: '#fff' })
        .setOrigin(0.5).setInteractive().on('pointerdown', cb);
}

function drawBtn(scene, x, y, label, callback) {
    let b = scene.add.circle(x, y, 45, 0xffffff, 0.15).setInteractive().setDepth(100);
    scene.add.text(x, y, label, {fontSize: '20px', fontStyle: 'bold'}).setOrigin(0.5);
    b.on('pointerdown', () => callback(true)); b.on('pointerup', () => callback(false));
}
</script>
</body>
</html>
