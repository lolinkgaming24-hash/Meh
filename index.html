<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Full Class Roster</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 10 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, gameState = 'MENU', mode = 1;
let selections = { p1: 'Wizard', p2: 'Wizard' };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p1 = name; handleP1Choice.call(this); });
    });
    createMenuBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p1 = 'Random'; handleP1Choice.call(this); }).setStyle({fill: '#ffff00'});
}

function handleP1Choice() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p2 = name; startMatch.call(this); });
    });
    createMenuBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p2 = 'Random'; startMatch.call(this); }).setStyle({fill: '#ffff00'});
}

function getRandomChar() {
    return Math.random() < 0.2 ? 'Ghost' : CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    
    let char1 = (selections.p1 === 'Random') ? getRandomChar() : selections.p1;
    let char2 = (selections.p2 === 'Random') ? getRandomChar() : selections.p2;

    p1 = createChar(this, 200, 300, 0x00ff00, char1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, char2, 2);
    
    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);
    this.physics.add.collider([p1, p2], ground);

    this.physics.add.overlap(projectiles, [p1, p2], (char, proj) => {
        if (proj.owner !== char.id) {
            if (proj.isGhostBeam) {
                dealDamage(proj.launcher, char, char.isBlocking ? 0.15 : 0.5, false);
            } else {
                let d = (proj.isFireball) ? 35 : (proj.isSentryBolt ? 4 : 20);
                if (char.isBlocking) d *= 0.3;
                dealDamage(proj.launcher, char, d);
                proj.destroy();
            }
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p1Skl = this.add.rectangle(20, 48, 200, 8, 0x00ffff).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);
    this.p2Skl = this.add.rectangle(830, 48, 200, 8, 0x00ffff).setOrigin(1, 0);

    createMenuBtn(this, 425, 30, 'PAUSE', () => {
        if (gameState === 'PLAYING') {
            this.physics.pause(); gameState = 'PAUSED';
            let ov = this.add.rectangle(425, 240, 850, 480, 0x000, 0.6).setDepth(500);
            let rs = createMenuBtn(this, 425, 200, 'RESUME', () => { ov.destroy(); rs.destroy(); ex.destroy(); this.physics.resume(); gameState = 'PLAYING'; }).setDepth(501);
            let ex = createMenuBtn(this, 425, 280, 'QUIT', () => showMenu.call(this)).setDepth(501);
        }
    });

    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN,SHIFT,SPACE');
    gameState = 'PLAYING';
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let c = (type === 'Ghost') ? 0xaaaaaa : color;
    let weapon = (type === 'Wizard') ? scene.add.container(20, 0) : scene.add.rectangle(20, 0, 30, 6, 0xccc).setOrigin(0, 0.5);
    if(type === 'Wizard') weapon.add([scene.add.rectangle(0,0,5,40,0x5d3a1a).setAngle(45), scene.add.circle(15,-15,5,0xffd700)]);
    container.add([scene.add.circle(0, -25, 15, c), scene.add.rectangle(0, 5, 8, 40, c), weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);
    container.hp = 100; container.type = type; container.id = id;
    container.maxSkl = (type === 'Ghost' ? 12000 : 8000); 
    container.skillCD = 0; container.atkCD = 0; 
    container.isStunned = false; container.isBlocking = false; container.isChannelling = false; container.facing = (id === 1 ? 1 : -1);
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;
    p1.isBlocking = this.keys.SHIFT.isDown || p1.mBlock;
    processMove(p1, this.keys.A, this.keys.D);
    if(mode === 2) { p2.isBlocking = this.keys.SPACE.isDown || p2.mBlock; processMove(p2, this.keys.LEFT, this.keys.RIGHT); } 
    else processAI(p2, p1);

    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.list[0].tint = p.isBlocking ? 0x00aaff : (p.isChannelling ? 0xffaa00 : 0xffffff);
    });

    this.p1Skl.width = (1 - (p1.skillCD / p1.maxSkl)) * 200;
    this.p2Skl.width = (1 - (p2.skillCD / p2.maxSkl)) * 200;
    this.p1Bar.width = Math.max(0, p1.hp) * 2;
    this.p2Bar.width = Math.max(0, p2.hp) * 2;

    projectiles.getChildren().forEach(proj => {
        if(proj.isGhostBeam) { proj.x = proj.launcher.x + (proj.launcher.facing * 400); proj.y = proj.launcher.y; }
        else if(proj.active) { proj.x += proj.moveDir * proj.speed; if(proj.x < -100 || proj.x > 950) proj.destroy(); }
    });

    if(p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "P2" : "P1");
}

function processMove(p, l, r) {
    if (p.isStunned || p.isBlocking || p.isChannelling) { p.body.setVelocityX(0); return; }
    if (l?.isDown || p.mLeft) { p.body.setVelocityX(-220); p.facing = -1; p.list[2].scaleX = -1; p.list[2].x = -20; }
    else if (r?.isDown || p.mRight) { p.body.setVelocityX(220); p.facing = 1; p.list[2].scaleX = 1; p.list[2].x = 20; }
    else p.body.setVelocityX(0);
}

function handleCombat(a, t, type) {
    if (a.isStunned || a.isBlocking || a.isChannelling || gameState !== 'PLAYING') return; 

    if(type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 1000;
        a.scene.tweens.add({ targets: a.list[2], angle: a.facing > 0 ? 90 : -90, duration: 150, yoyo: true });
        if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 100) dealDamage(a, t, t.isBlocking ? 3 : 10);
    }

    if(type === 'skl' && a.skillCD <= 0) {
        a.skillCD = a.maxSkl;
        if(a.type === 'Ghost') {
            a.isChannelling = true;
            let beam = a.scene.add.rectangle(a.x + (a.facing * 400), a.y, 800, 140, 0x00ffff, 0.4).setDepth(4);
            a.scene.physics.add.existing(beam); beam.body.setAllowGravity(false);
            beam.owner = a.id; beam.launcher = a; beam.isGhostBeam = true; projectiles.add(beam);
            a.scene.tweens.add({ targets: beam, alpha: 0, duration: 1200, onComplete: () => { beam.destroy(); a.isChannelling = false; }});
        } else if(a.type === 'Wizard') {
            let ball = a.scene.add.circle(a.x, a.y, 15, 0xff4400);
            a.scene.physics.add.existing(ball); ball.body.setAllowGravity(false);
            ball.moveDir = a.facing; ball.owner = a.id; ball.launcher = a; ball.isFireball = true; ball.speed = 7; projectiles.add(ball);
        } else if(a.type === 'Digger') {
            a.isChannelling = true; a.body.setAllowGravity(false); a.body.setVelocityY(0);
            a.scene.tweens.add({ targets: a, y: a.y + 100, alpha: 0.3, duration: 300, yoyo: true, hold: 1000, 
                onUpdate: () => { a.x += a.facing * 4; },
                onComplete: () => { a.isChannelling = false; a.body.setAllowGravity(true); if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 150) dealDamage(a, t, 25); }
            });
        } else if(a.type === 'Engineer') {
            let sentry = a.scene.add.rectangle(a.x, a.y + 20, 30, 30, 0x555555);
            a.scene.physics.add.existing(sentry); sentry.body.setImmovable(true);
            a.scene.time.addEvent({ delay: 800, repeat: 5, callback: () => {
                let bolt = a.scene.add.rectangle(sentry.x, sentry.y, 10, 5, 0xff00ff);
                a.scene.physics.add.existing(bolt); bolt.body.setAllowGravity(false);
                bolt.moveDir = (t.x > sentry.x ? 1 : -1); bolt.owner = a.id; bolt.launcher = a; bolt.isSentryBolt = true; bolt.speed = 10; projectiles.add(bolt);
            }});
            a.scene.time.delayedCall(5000, () => sentry.destroy());
        } else {
            if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 150) dealDamage(a, t, 20);
        }
    }
}

function dealDamage(a, t, d, fx=true) { t.hp -= d; if(fx && Math.random() > 0.5) { let s = a.scene.add.circle(t.x, t.y, 20, 0xffffff, 0.5); a.scene.tweens.add({targets: s, alpha:0, scale:2, duration:200, onComplete:()=>s.destroy()}); } }

function setupMobileControls() {
    drawBtn(this, 60, 400, '←', (v)=>p1.mLeft=v); drawBtn(this, 160, 400, '→', (v)=>p1.mRight=v);
    drawBtn(this, 110, 310, '↑', (v)=>{ if(v && p1.body.touching.down) p1.body.setVelocityY(-600)});
    drawBtn(this, 260, 410, 'ATK', (v)=>{ if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(this, 350, 410, 'SKL', (v)=>{ if(v) handleCombat(p1, p2, 'skl') });
    drawBtn(this, 305, 330, 'BLK', (v)=>p1.mBlock=v);
}

function drawBtn(scene, x, y, label, cb) {
    let b = scene.add.circle(x, y, 35, 0xffffff, 0.2).setInteractive();
    scene.add.text(x, y, label).setOrigin(0.5);
    b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
}

function createMenuBtn(scene, x, y, txt, cb) { return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 10 }).setOrigin(0.5).setInteractive().on('pointerdown', cb); }

function endGame(w) { gameState = 'END'; this.physics.pause(); this.add.text(425, 200, w + " WINS", {fontSize:'60px'}).setOrigin(0.5); createMenuBtn(this, 425, 300, 'REMATCH', () => startMatch.call(this)); }

function processAI(c, t) {
    if(c.isChannelling) return;
    let d = Math.abs(c.x - t.x);
    if(d > 200) c.body.setVelocityX(c.x > t.x ? -150 : 150); else c.body.setVelocityX(0);
    c.facing = c.x > t.x ? -1 : 1;
    if(c.skillCD <= 0 && d < 400) handleCombat(c, t, 'skl');
    if(c.atkCD <= 0 && d < 100) handleCombat(c, t, 'atk');
}
</script>
</body>
</html>
