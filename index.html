<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Fixed & Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 5 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1400 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, bullets, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };
const CLASSES = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    bullets = this.physics.add.group({ allowGravity: false });
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p1 = name; handleP1Choice.call(this); });
    });
    createMenuBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p1 = 'Random'; handleP1Choice.call(this); }).setStyle({fill: '#ffff00'});
}

function handleP1Choice() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p2 = name; startMatch.call(this); });
    });
    createMenuBtn(this, 425, 360, '?? RANDOM ??', () => { selections.p2 = 'Random'; startMatch.call(this); }).setStyle({fill: '#ffff00'});
}

function startMatch() {
    this.children.removeAll();
    bullets.clear(true, true);
    
    let char1 = selections.p1 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p1;
    let char2 = selections.p2 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p2;

    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 200, 300, 0x00ff00, char1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, char2, 2);
    
    this.physics.add.collider([p1, p2], ground);
    
    // Physical Bullet Collision
    this.physics.add.overlap(bullets, [p1, p2], (target, bullet) => {
        if (bullet.ownerId !== target.id) {
            dealDamage(bullet.launcher, target, bullet.dmg);
            if (bullet.isSkill) applyBleed(target);
            bullet.destroy();
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);

    let pauseBtn = this.add.text(425, 25, '||', { fontSize: '24px', backgroundColor: '#333', padding: 5 })
        .setOrigin(0.5).setInteractive().setDepth(200);
    pauseBtn.on('pointerdown', () => togglePause.call(this));

    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN');
    gameState = 'PLAYING';
}

function togglePause() {
    if (gameState === 'END') return;
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED'; this.physics.pause();
        this.pausePanel = this.add.container(425, 240).setDepth(300);
        let bg = this.add.rectangle(0, 0, 300, 220, 0x000, 0.9).setStrokeStyle(2, 0xfff);
        this.pausePanel.add([bg, this.add.text(0, -70, 'PAUSED', { fontSize: '32px' }).setOrigin(0.5)]);
        this.pausePanel.add(createMenuBtn(this, 0, -10, 'RESUME', () => togglePause.call(this)));
        this.pausePanel.add(createMenuBtn(this, 0, 60, 'MAIN MENU', () => location.reload()));
    } else {
        gameState = 'PLAYING'; this.physics.resume(); this.pausePanel.destroy();
    }
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let head = scene.add.circle(0, -25, 15, color);
    let body = scene.add.rectangle(0, 5, 8, 40, color);
    let weapon = (type === 'Gunman') ? scene.add.rectangle(20, 0, 30, 10, 0x666).setOrigin(0, 0.5) : 
                 (type === 'Swordman' ? scene.add.rectangle(20, 0, 45, 8, 0xccc).setOrigin(0, 0.5) : scene.add.circle(20, 0, 12, 0x444));
    let shield = scene.add.circle(0, 0, 55, 0x00ffff, 0.2).setStrokeStyle(3, 0x00ffff).setVisible(false);
    
    container.add([head, body, weapon, shield]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70).setDragX(1000);
    
    container.hp = 100; container.type = type; container.id = id;
    container.atkCD = 0; container.skillCD = 0; container.shieldHits = 0;
    container.isBleeding = false; container.facing = (id === 1 ? 1 : -1);
    
    // Movement toggles for mobile
    container.moveLeft = false; container.moveRight = false; container.moveJump = false;
    
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    processMove(p1, this.keys.A, this.keys.D, this.keys.W);
    if(mode === 2) processMove(p2, this.keys.LEFT, this.keys.RIGHT, this.keys.UP);
    else processAI(p2, p1);

    [p1, p2].forEach(p => {
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.list[3].setVisible(p.shieldHits > 0);
    });

    this.p1Bar.width = Math.max(0, p1.hp) * 2;
    this.p2Bar.width = Math.max(0, p2.hp) * 2;
    if(p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "RED PLAYER" : "GREEN PLAYER");
}

function processMove(p, l, r, u) {
    let speed = 250;
    if (l.isDown || p.moveLeft) { p.body.setVelocityX(-speed); p.facing = -1; p.list[2].x = -20; p.list[2].scaleX = -1; }
    else if (r.isDown || p.moveRight) { p.body.setVelocityX(speed); p.facing = 1; p.list[2].x = 20; p.list[2].scaleX = 1; }
    else p.body.setVelocityX(0);

    if ((u.isDown || p.moveJump) && p.body.touching.down) p.body.setVelocityY(-650);
}

function processAI(cpu, target) {
    let dist = Math.abs(cpu.x - target.x);
    let ideal = cpu.type === 'Gunman' ? 250 : 70;
    if (dist > ideal + 30) { cpu.body.setVelocityX(cpu.x > target.x ? -180 : 180); cpu.facing = cpu.x > target.x ? -1 : 1; }
    else if (dist < ideal - 30) { cpu.body.setVelocityX(cpu.x > target.x ? 180 : -180); cpu.facing = cpu.x > target.x ? 1 : -1; }
    else cpu.body.setVelocityX(0);

    cpu.list[2].x = cpu.facing * 20; cpu.list[2].scaleX = cpu.facing;
    if (cpu.atkCD <= 0 && dist < (cpu.type === 'Gunman' ? 400 : 100)) handleCombat(cpu, target, 'atk');
    if (cpu.skillCD <= 0 && dist < (cpu.type === 'Gunman' ? 400 : 100)) handleCombat(cpu, target, 'skl');
}

function handleCombat(a, t, type) {
    if (gameState !== 'PLAYING') return;

    if(type === 'atk' && a.atkCD <= 0) {
        a.atkCD = a.type === 'Gunman' ? 800 : 600;
        if(a.type === 'Gunman') {
            fireBullet(a, 5, false, 0xffff00);
        } else {
            if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 100) dealDamage(a, t, 8);
        }
    }

    if(type === 'skl' && a.skillCD <= 0) {
        a.skillCD = 8000;
        if(a.type === 'Gunman') {
            fireBullet(a, 5, true, 0xff0000);
        } else if(a.type === 'Engineer') { 
            a.shieldHits = 3; 
            a.scene.time.delayedCall(5000, () => a.shieldHits = 0);
        }
    }
}

function fireBullet(a, dmg, isSkill, color) {
    let b = a.scene.add.rectangle(a.x + (a.facing * 30), a.y, 15, 4, color);
    a.scene.physics.add.existing(b);
    b.body.setAllowGravity(false).setVelocityX(a.facing * 1000);
    b.ownerId = a.id; b.launcher = a; b.dmg = dmg; b.isSkill = isSkill;
    bullets.add(b);
    
    // Half-screen range auto-destroy
    let startX = a.x;
    a.scene.events.on('update', () => {
        if(b.active && Math.abs(b.x - startX) > 425) b.destroy();
    });
}

function applyBleed(target) {
    if (target.isBleeding) return;
    target.isBleeding = true;
    target.list[0].setTint(0x880000);
    let count = 0;
    let bleedTimer = target.scene.time.addEvent({
        delay: 1000,
        callback: () => {
            if (gameState === 'PLAYING') {
                target.hp -= 3;
                spawnFX(target.scene, target.x, target.y, 0x880000);
                count++;
                if (count >= 3 || target.hp <= 0) {
                    target.isBleeding = false;
                    target.list[0].clearTint();
                    bleedTimer.remove();
                }
            }
        },
        loop: true
    });
}

function dealDamage(a, t, dmg) {
    if(t.shieldHits > 0) { t.shieldHits--; spawnFX(a.scene, t.x, t.y, 0x00ffff); }
    else t.hp -= dmg;
    spawnFX(a.scene, t.x, t.y, 0xffffff);
}

function spawnFX(scene, x, y, color) {
    let s = scene.add.circle(x, y, 15, color, 0.5);
    scene.tweens.add({ targets: s, alpha: 0, scale: 2, duration: 200, onComplete: () => s.destroy() });
}

function setupMobileControls() {
    const drawBtn = (x, y, txt, cb) => {
        let b = this.add.circle(x, y, 40, 0xffffff, 0.1).setInteractive().setDepth(100);
        this.add.text(x, y, txt).setOrigin(0.5);
        b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
    };
    drawBtn(70, 380, '←', v => p1.moveLeft = v);
    drawBtn(170, 380, '→', v => p1.moveRight = v);
    drawBtn(120, 300, '↑', v => p1.moveJump = v);
    drawBtn(750, 380, 'ATK', v => { if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(650, 380, 'SKL', v => { if(v) handleCombat(p1, p2, 'skl') });
}

function endGame(winner) {
    gameState = 'END'; this.physics.pause();
    this.add.rectangle(425, 240, 850, 480, 0x000, 0.7);
    this.add.text(425, 200, winner + " WINS!", {fontSize: '48px'}).setOrigin(0.5);
    createMenuBtn(this, 425, 300, 'REMATCH', () => startMatch.call(this));
}

function createMenuBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 12 }).setOrigin(0.5).setInteractive().on('pointerdown', cb);
}
</script>
</body>
</html>
