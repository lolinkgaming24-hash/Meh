<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Side-by-Side Controls</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 10 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, bullets, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };
const CLASSES = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');
    bullets = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createMenuBtn(this, 425, 220, '1 PLAYER (vs CPU)', () => { mode = 1; selectP1.call(this); });
    createMenuBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p1 = name; handleP1Choice.call(this); });
    });
}

function handleP1Choice() {
    if (mode === 2) selectP2.call(this);
    else { selections.p2 = 'Random'; startMatch.call(this); }
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createMenuBtn(this, 425, 100 + (i * 50), name, () => { selections.p2 = name; startMatch.call(this); });
    });
}

function startMatch() {
    this.children.removeAll();
    bullets.clear(true, true);
    
    let char1 = selections.p1 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p1;
    let char2 = selections.p2 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p2;

    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);

    p1 = createChar(this, 200, 300, 0x00ff00, char1, 1);
    p2 = createChar(this, 650, 300, 0xff0000, char2, 2);
    
    this.physics.add.collider([p1, p2], ground);
    this.physics.add.overlap(bullets, [p1, p2], (char, bullet) => {
        if (bullet.active && bullet.owner !== char.id) {
            dealDamage(bullet.launcher, char, bullet.isSkill ? 15 : 7);
            bullet.destroy();
        }
    });

    this.p1Bar = this.add.rectangle(20, 25, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 25, 200, 20, 0xff0000).setOrigin(1, 0);

    setupMobileControls.call(this);
    gameState = 'PLAYING';
}

function createChar(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    let head = scene.add.circle(0, -25, 15, color);
    let body = scene.add.rectangle(0, 5, 8, 40, color);
    let weapon;
    if(type === 'Gunman') weapon = scene.add.rectangle(20, 0, 30, 10, 0x666).setOrigin(0, 0.5);
    else weapon = scene.add.rectangle(20, 0, 40, 8, 0xccc).setOrigin(0, 0.5);
    
    container.add([head, body, weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);
    
    container.hp = 100; container.type = type; container.id = id;
    container.atkCD = 0; container.skillCD = 0;
    container.facing = (id === 1 ? 1 : -1);
    return container;
}

function setupMobileControls() {
    // --- PLAYER 1 (WHOLE LEFT SIDE) ---
    // Movement
    drawBtn(this, 60, 400, '←', (v)=>p1.mLeft=v);
    drawBtn(this, 180, 400, '→', (v)=>p1.mRight=v);
    drawBtn(this, 120, 320, '↑', (v)=>{ if(v && p1.body.touching.down) p1.body.setVelocityY(-600)});
    // Combat
    drawBtn(this, 280, 400, 'ATK', (v)=>{ if(v) handleCombat(p1, p2, 'atk') });
    drawBtn(this, 380, 400, 'SKL', (v)=>{ if(v) handleCombat(p1, p2, 'skl') });

    if(mode === 2) {
        // --- PLAYER 2 (WHOLE RIGHT SIDE) ---
        // Movement
        drawBtn(this, 470, 400, '←', (v)=>p2.mLeft=v);
        drawBtn(this, 590, 400, '→', (v)=>p2.mRight=v);
        drawBtn(this, 530, 320, '↑', (v)=>{ if(v && p2.body.touching.down) p2.body.setVelocityY(-600)});
        // Combat
        drawBtn(this, 690, 400, 'ATK', (v)=>{ if(v) handleCombat(p2, p1, 'atk') });
        drawBtn(this, 790, 400, 'SKL', (v)=>{ if(v) handleCombat(p2, p1, 'skl') });
    }
}

function drawBtn(scene, x, y, label, callback) {
    let b = scene.add.circle(x, y, 35, 0xffffff, 0.2).setInteractive().setDepth(100);
    scene.add.text(x, y, label, {fontSize: '16px', fontStyle: 'bold'}).setOrigin(0.5);
    b.on('pointerdown', () => callback(true)); b.on('pointerup', () => callback(false));
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    processMove(p1);
    if(mode === 2) processMove(p2); else processAI(p2, p1);

    [p1, p2].forEach(p => {
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.skillCD = Math.max(0, p.skillCD - delta);
    });

    this.p1Bar.width = p1.hp * 2;
    this.p2Bar.width = p2.hp * 2;

    // BULLET PHYSICS FIX (No gravity, perfectly straight)
    bullets.getChildren().forEach(b => {
        if(b.active) {
            b.body.velocity.y = 0;
            b.y = b.startY;
        }
    });

    if(p1.hp <= 0 || p2.hp <= 0) { alert("Game Over"); location.reload(); }
}

function processMove(p) {
    if (p.mLeft) { p.body.setVelocityX(-220); p.facing = -1; p.list[2].scaleX = -1; p.list[2].x = -20; }
    else if (p.mRight) { p.body.setVelocityX(220); p.facing = 1; p.list[2].scaleX = 1; p.list[2].x = 20; }
    else p.body.setVelocityX(0);
}

function processAI(cpu, target) {
    let dist = Math.abs(cpu.x - target.x);
    cpu.facing = cpu.x > target.x ? -1 : 1;
    cpu.list[2].scaleX = cpu.facing; cpu.list[2].x = cpu.facing * 20;
    if (dist > 300) cpu.body.setVelocityX(cpu.facing * 160);
    else cpu.body.setVelocityX(0);
    if (cpu.atkCD <= 0 && dist < 500) handleCombat(cpu, target, 'atk');
}

function shoot(a, isSkill = false) {
    // Spawn bullet at gun height
    let b = a.scene.add.rectangle(a.x + (a.facing * 40), a.y - 5, 45, 8, isSkill ? 0xff0000 : 0xdddddd);
    a.scene.physics.add.existing(b);
    
    // FORCE NO GRAVITY
    b.body.allowGravity = false;
    b.body.setGravityY(0);
    b.body.setVelocityX(a.facing * 1400); 
    
    b.owner = a.id; b.launcher = a; b.isSkill = isSkill; b.startY = b.y;
    bullets.add(b);
    a.scene.time.delayedCall(1500, () => { if(b.active) b.destroy(); });
}

function handleCombat(a, t, type) {
    if (type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 800;
        if(a.type === 'Gunman') shoot(a);
        else if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 90) dealDamage(a, t, 10);
    }
    if (type === 'skl' && a.skillCD <= 0) {
        a.skillCD = 10000;
        if(a.type === 'Gunman') shoot(a, true);
        else if(Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 150) dealDamage(a, t, 25);
    }
}

function dealDamage(a, t, dmg) {
    t.hp -= dmg;
    let s = a.scene.add.circle(t.x, t.y, 25, 0xffffff, 0.5);
    a.scene.tweens.add({ targets: s, alpha: 0, scale: 2, duration: 250, onComplete: ()=>s.destroy() });
}

function createMenuBtn(scene, x, y, txt, cb) {
    return scene.add.text(x, y, txt, { backgroundColor: '#222', padding: 12, color: '#fff' })
        .setOrigin(0.5).setInteractive().on('pointerdown', cb);
}
</script>
</body>
</html>
