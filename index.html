<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Definitive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1400 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, beams, gameState = 'MENU', mode = 1, matchTimer = 90, timerText;
let selections = { p1: null, p2: null };

const HP_MAP = { Swordman:120, Wizard:80, Bomber:100, Digger:90, Engineer:110, Freezer:100, Ghost:150, Reaper:130 };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];

function preload() {}

function create() {
    projectiles = this.physics.add.group();
    beams = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    createBtn(this, 425, 220, '1 PLAYER (VS CPU)', () => { mode = 1; selectP1.call(this); });
    createBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectP1.call(this); });
}

function selectP1() {
    this.children.removeAll();
    this.add.text(425, 40, 'P1: SELECT CLASS', { fontSize: '28px', color: '#0f0' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createBtn(this, 425, 90 + (i * 45), name, () => { selections.p1 = name; (mode === 2) ? selectP2.call(this) : (selections.p2 = 'Random', startMatch.call(this)); });
    });
    createBtn(this, 425, 380, '?? RANDOM ??', () => { selections.p1 = 'Random'; (mode === 2) ? selectP2.call(this) : (selections.p2 = 'Random', startMatch.call(this)); }, '#442', '#ff0');
}

function selectP2() {
    this.children.removeAll();
    this.add.text(425, 40, 'P2: SELECT CLASS', { fontSize: '28px', color: '#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        createBtn(this, 425, 90 + (i * 45), name, () => { selections.p2 = name; startMatch.call(this); });
    });
    createBtn(this, 425, 380, '?? RANDOM ??', () => { selections.p2 = 'Random'; startMatch.call(this); }, '#442', '#ff0');
}

function getRandom() {
    let r = Math.random();
    if (r < 0.15) return 'Ghost';
    if (r < 0.30) return 'Reaper';
    return CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    beams.clear(true, true);
    matchTimer = 90;

    let c1 = (selections.p1 === 'Random') ? getRandom() : selections.p1;
    let c2 = (selections.p2 === 'Random') ? getRandom() : selections.p2;

    p1 = spawnPlayer(this, 150, 300, 0x00ff00, c1, 1);
    p2 = spawnPlayer(this, 700, 300, 0xff0000, c2, 2);

    let floor = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(floor, true);
    this.physics.add.collider([p1, p2], floor);

    // Combat Logic
    this.physics.add.overlap(projectiles, [p1, p2], (target, proj) => {
        if (proj.owner !== target.id) {
            if (proj.isFreeze) applyStun(target, 3000, true);
            else dealDamage(proj.launcher, target, target.isBlocking ? 6 : 18);
            proj.destroy();
        }
    });

    this.physics.add.overlap(beams, [p1, p2], (target, beam) => {
        if (beam.owner !== target.id) dealDamage(beam.launcher, target, target.isBlocking ? 0.2 : 0.6, false);
    });

    // BEAM CLASH
    this.physics.add.overlap(beams, beams, (b1, b2) => {
        if (b1.owner !== b2.owner) {
            let spark = this.add.circle((b1.launcher.x + b2.launcher.x)/2, b1.y + Phaser.Math.Between(-10,10), 6, 0xffffff);
            this.tweens.add({ targets: spark, alpha: 0, scale: 2, duration: 150, onComplete: () => spark.destroy() });
        }
    });

    this.p1Bar = this.add.rectangle(20, 30, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 30, 200, 20, 0xff0000).setOrigin(1, 0);
    timerText = this.add.text(425, 30, '01:30', { fontSize: '32px', color: '#fff' }).setOrigin(0.5);
    
    createBtn(this, 425, 80, 'PAUSE', () => pauseGame.call(this), '#111', '#fff', 12);
    setupMobileControls.call(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN,SHIFT,SPACE');
    gameState = 'PLAYING';
}

function spawnPlayer(scene, x, y, col, type, id) {
    let container = scene.add.container(x, y);
    let skin = (type === 'Ghost' || type === 'Reaper') ? 0x999999 : col;
    
    // Weapon Rendering
    let weaponWrap = scene.add.container(20, 0);
    if (type === 'Swordman' || type === 'Wizard' || type === 'Reaper') {
        weaponWrap.add(scene.add.rectangle(0, 0, 35, 6, type === 'Reaper' ? 0xffffff : 0xcccccc).setOrigin(0, 0.5));
    } else if (type === 'Digger') {
        weaponWrap.add([scene.add.rectangle(0,0,30,4,0x664422), scene.add.rectangle(25,-5,10,15,0x888).setAngle(45)]);
    } else if (type === 'Engineer') {
        weaponWrap.add([scene.add.rectangle(0,0,25,6,0x555), scene.add.rectangle(25,-3,8,12,0x555)]);
    } else if (type === 'Freezer') {
        weaponWrap.add([scene.add.rectangle(0,0,30,4,0xffffff), scene.add.circle(30,0,8,0x00ffff)]);
    } else if (type === 'Bomber') {
        weaponWrap.add(scene.add.rectangle(0, 0, 15, 15, 0x333333));
    }

    container.add([scene.add.circle(0, -25, 15, skin), scene.add.rectangle(0, 5, 8, 40, skin), weaponWrap]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);

    container.hp = HP_MAP[type]; container.maxHp = HP_MAP[type]; container.type = type; container.id = id;
    container.skillCD = 0; container.atkCD = 0; container.facing = (id === 1 ? 1 : -1);
    container.isStunned = false; container.isBlocking = false; container.isChannelling = false;
    
    container.spirit = scene.add.circle(-30, -40, 12, 0x888888, 0.5).setAlpha(0);
    container.iceBox = scene.add.rectangle(0, -10, 60, 80, 0x00ffff, 0.4).setAlpha(0);
    container.shield = scene.add.circle(0, 0, 45, 0x00ffff, 0.2).setAlpha(0);
    
    container.add([container.spirit, container.iceBox, container.shield]);
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    matchTimer -= delta/1000;
    let m = Math.floor(matchTimer/60), s = Math.floor(matchTimer%60);
    timerText.setText(`${m}:${s < 10 ? '0'+s : s}`);
    if (matchTimer <= 0) endGame.call(this, p1.hp >= p2.hp ? "PLAYER 1" : "PLAYER 2");

    [p1, p2].forEach(p => {
        p.skillCD = Math.max(0, p.skillCD - delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
        p.shield.setAlpha(p.shieldHits > 0 ? 0.5 : 0);
        if (p.type === 'Reaper') p.spirit.setAlpha(p.hp < (p.maxHp/2) ? 0.8 : 0);
    });

    this.p1Bar.width = Math.max(0, p1.hp) * (200/p1.maxHp);
    this.p2Bar.width = Math.max(0, p2.hp) * (200/p2.maxHp);

    // Input Handling
    p1.isBlocking = (this.keys.SHIFT.isDown || p1.mBlock);
    handleMove(p1, this.keys.A, this.keys.D, this.keys.W);
    if (mode === 2) {
        p2.isBlocking = (this.keys.SPACE.isDown || p2.mBlock);
        handleMove(p2, this.keys.LEFT, this.keys.RIGHT, this.keys.UP);
    } else handleAI(p2, p1);

    // Fixed Projectile Physics
    projectiles.getChildren().forEach(proj => {
        if (proj.isFireball) {
            proj.body.setVelocityX(proj.moveDir * 500);
            proj.body.setAllowGravity(false);
        }
        if (proj.x < -50 || proj.x > 900) proj.destroy();
    });

    beams.getChildren().forEach(b => {
        b.x = b.launcher.x + (b.launcher.facing * 400);
        b.y = b.launcher.y;
    });

    if (p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "PLAYER 2" : "PLAYER 1");
}

function handleMove(p, l, r, u) {
    if (p.isStunned || p.isChannelling || p.isBlocking) { p.body.setVelocityX(0); return; }
    if (l.isDown || p.mLeft) { p.body.setVelocityX(-250); p.facing = -1; p.list[2].scaleX = -1; p.list[2].x = -20; }
    else if (r.isDown || p.mRight) { p.body.setVelocityX(250); p.facing = 1; p.list[2].scaleX = 1; p.list[2].x = 20; }
    else p.body.setVelocityX(0);
    if ((u.isDown || p.mJump) && p.body.touching.down) p.body.setVelocityY(-650);
}

function handleCombat(a, t, type) {
    if (a.isStunned || a.isBlocking || a.isChannelling || gameState !== 'PLAYING') return;

    if (type === 'atk' && a.atkCD <= 0) {
        a.atkCD = 800;
        a.scene.tweens.add({ targets: a.list[2], angle: a.facing > 0 ? 90 : -90, duration: 150, yoyo: true });
        if (Phaser.Math.Distance.Between(a.x, a.y, t.x, t.y) < 100) {
            let d = 10;
            if (a.type === 'Reaper') d = (a.hp < a.maxHp/2) ? 10 : 5;
            if (a.type === 'Ghost') d = 15;
            if (a.type === 'Freezer') { applyStun(t, 500, true); d = 5; }
            dealDamage(a, t, t.isBlocking ? d/4 : d);
        }
    }

    if (type === 'skl' && a.skillCD <= 0) {
        a.skillCD = (a.type === 'Reaper' && a.hp < a.maxHp/2) ? 20000 : 9000;
        if (a.type === 'Reaper') {
            if (a.hp >= a.maxHp/2) a.hp = Math.min(a.maxHp, a.hp + 10);
            else createBeam(a, 0xff00ff);
        } else if (a.type === 'Ghost') createBeam(a, 0x00ffff);
        else if (a.type === 'Wizard') {
            let f = a.scene.add.circle(a.x, a.y, 15, 0xff6600);
            a.scene.physics.add.existing(f); f.owner = a.id; f.launcher = a; f.isFireball = true; f.moveDir = a.facing;
            projectiles.add(f);
        } else if (a.type === 'Bomber') {
            let b = a.scene.add.circle(a.x, a.y, 12, 0x333);
            a.scene.physics.add.existing(b); b.body.setVelocity(a.facing * 400, -500);
            b.owner = a.id; b.launcher = a; projectiles.add(b);
            a.scene.time.delayedCall(1200, () => {
                if (!b.active) return;
                let ex = a.scene.add.circle(b.x, b.y, 100, 0xff6600, 0.6);
                if (Phaser.Math.Distance.Between(ex.x, ex.y, t.x, t.y) < 110) dealDamage(a, t, 40);
                b.destroy(); a.scene.tweens.add({ targets: ex, alpha:0, scale:2, duration:300, onComplete:() => ex.destroy() });
            });
        } else if (a.type === 'Engineer') a.shieldHits = 3;
        else if (a.type === 'Digger') { a.isInvisible = true; a.scene.time.delayedCall(3000, () => a.isInvisible = false); }
        else if (a.type === 'Freezer') {
            let w = a.scene.add.rectangle(a.x + (a.facing * 150), a.y, 300, 80, 0x00ffff, 0.4);
            a.scene.physics.add.existing(w); w.body.setAllowGravity(false);
            w.owner = a.id; w.launcher = a; w.isFreeze = true; projectiles.add(w);
            a.scene.time.delayedCall(400, () => w.destroy());
        }
    }
}

function createBeam(a, col) {
    a.isChannelling = true;
    let b = a.scene.add.container(a.x, a.y, [
        a.scene.add.rectangle(0, 0, 800, 100, col, 0.3),
        a.scene.add.rectangle(0, 0, 800, 30, 0xffffff, 0.8)
    ]);
    a.scene.physics.add.existing(b); b.body.setAllowGravity(false);
    b.owner = a.id; b.launcher = a; beams.add(b);
    a.scene.time.delayedCall(2500, () => { b.destroy(); a.isChannelling = false; });
}

function dealDamage(a, t, d, fx=true) {
    if (t.shieldHits > 0 && d > 1) { t.shieldHits--; return; }
    t.hp -= d;
    if (fx) {
        let s = a.scene.add.circle(t.x, t.y, 15, 0xffffff, 0.6);
        a.scene.tweens.add({ targets: s, alpha:0, scale:2, duration:200, onComplete:()=>s.destroy() });
    }
}

function applyStun(t, d, ice) {
    t.isStunned = true;
    if (ice) t.iceBox.setAlpha(1);
    t.scene.time.delayedCall(d, () => { t.isStunned = false; t.iceBox.setAlpha(0); });
}

function pauseGame() {
    this.physics.pause(); gameState = 'PAUSED';
    let ov = this.add.rectangle(425, 240, 850, 480, 0x000, 0.8).setDepth(1000);
    createBtn(this, 425, 200, 'RESUME', () => { ov.destroy(); this.physics.resume(); gameState = 'PLAYING'; }, '#111', '#fff', 1001);
    createBtn(this, 425, 280, 'QUIT', () => { this.physics.resume(); showMenu.call(this); }, '#111', '#fff', 1001);
}

function setupMobileControls() {
    const btn = (x, y, l, cb) => {
        let b = this.add.circle(x, y, 38, 0xfff, 0.2).setInteractive().setDepth(500);
        this.add.text(x, y, l).setOrigin(0.5).setDepth(501);
        b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
    };
    btn(70, 410, 'L', v => p1.mLeft = v); btn(170, 410, 'R', v => p1.mRight = v);
    btn(120, 320, 'J', v => p1.mJump = v); btn(280, 410, 'A', v => { if(v) handleCombat(p1, p2, 'atk') });
    btn(380, 410, 'S', v => { if(v) handleCombat(p1, p2, 'skl') }); btn(330, 320, 'B', v => p1.mBlock = v);
    if (mode === 2) {
        btn(470, 410, 'S', v => { if(v) handleCombat(p2, p1, 'skl') }); btn(570, 410, 'A', v => { if(v) handleCombat(p2, p1, 'atk') });
        btn(520, 320, 'B', v => p2.mBlock = v); btn(680, 410, 'L', v => p2.mLeft = v);
        btn(780, 410, 'R', v => p2.mRight = v); btn(730, 320, 'J', v => p2.mJump = v);
    }
}

function createBtn(s, x, y, t, c, bg='#222', fg='#fff', depth=1) {
    return s.add.text(x, y, t, { backgroundColor: bg, padding: 10, color: fg }).setOrigin(0.5).setInteractive().on('pointerdown', c).setDepth(depth);
}

function endGame(w) {
    gameState = 'END'; this.physics.pause();
    this.add.text(425, 200, w + " WINS!", { fontSize: '60px', color: '#fff' }).setOrigin(0.5);
    createBtn(this, 425, 300, 'REMATCH', () => startMatch.call(this));
}

function handleAI(c, t) {
    if (c.isChannelling || c.isStunned || c.isBlocking) return;
    let d = Math.abs(c.x - t.x);
    if (d > 140) c.body.setVelocityX(c.x > t.x ? -160 : 160);
    else c.body.setVelocityX(0);
    c.facing = c.x > t.x ? -1 : 1;
    if (c.skillCD <= 0 && d < 300) handleCombat(c, t, 'skl');
    if (c.atkCD <= 0 && d < 110) handleCombat(c, t, 'atk');
    if (t.y < c.y - 50 && c.body.touching.down) c.body.setVelocityY(-600);
}
</script>
</body>
</html>
