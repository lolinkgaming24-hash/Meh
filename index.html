<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Definitive</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 10 }, 
    physics: { default: 'arcade', arcade: { gravity: { y: 1300 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, matchTimer = 90, timerText, gameState = 'MENU', mode = 1, p1Type, p2Type;
const HP_MAP = { Swordman:120, Wizard:80, Bomber:100, Digger:90, Engineer:110, Freezer:100, Ghost:150, Reaper:130 };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];

function preload() {}

function create() {
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '42px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    drawBtn(this, 425, 220, '1 PLAYER (VS CPU)', () => { mode = 1; selectChar.call(this, 1); });
    drawBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectChar.call(this, 1); });
}

function selectChar(pNum) {
    this.children.removeAll();
    this.add.text(425, 40, `PLAYER ${pNum} SELECT`, { fontSize: '24px', color: pNum===1?'#0f0':'#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        drawBtn(this, 425, 90 + (i * 42), name, () => { 
            if(pNum === 1) { p1Type = name; mode === 2 ? selectChar.call(this, 2) : (p2Type = 'Random', startGame.call(this)); }
            else { p2Type = name; startGame.call(this); }
        });
    });
    drawBtn(this, 425, 370, '?? RANDOM ??', () => {
        if(pNum === 1) { p1Type = 'Random'; mode === 2 ? selectChar.call(this, 2) : (p2Type = 'Random', startGame.call(this)); }
        else { p2Type = 'Random'; startGame.call(this); }
    }, '#660');
}

function roll(type) {
    if (type !== 'Random') return type;
    let r = Math.random();
    if (r < 0.15) return 'Ghost';
    if (r < 0.30) return 'Reaper';
    return CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

function startGame() {
    this.children.removeAll();
    projectiles.clear(true, true);
    matchTimer = 90;

    p1 = createChar(this, 150, 300, 0x00ff00, roll(p1Type), 1);
    p2 = createChar(this, 700, 300, 0xff0000, roll(p2Type), 2);

    let ground = this.add.rectangle(425, 470, 850, 20, 0x222);
    this.physics.add.existing(ground, true);
    this.physics.add.collider([p1, p2], ground);

    this.physics.add.overlap(projectiles, [p1, p2], (target, proj) => {
        if (proj.owner === target.id) return;
        let finalDmg = proj.dmg || 15;
        
        // BEAM CLASH CHECK
        if (proj.isBeam) {
            let clash = projectiles.getChildren().find(b => b.isBeam && b.owner !== proj.owner && Phaser.Geom.Intersects.RectangleToRectangle(proj.getBounds(), b.getBounds()));
            if (clash) {
                for(let i=0; i<3; i++) {
                    let s = this.add.circle(proj.x + (proj.width/2 * proj.launcher.facing), proj.y, 5, 0xffffff);
                    this.tweens.add({targets: s, alpha:0, y: s.y-50, duration: 200, onComplete:()=>s.destroy()});
                }
                finalDmg = 0; 
            }
        }
        
        target.hp -= (target.isBlocking ? finalDmg * 0.2 : finalDmg);
        if (!proj.isBeam) proj.destroy();
    });

    this.p1Bar = this.add.rectangle(20, 30, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 30, 200, 20, 0xff0000).setOrigin(1, 0);
    timerText = this.add.text(425, 30, '90', { fontSize: '32px' }).setOrigin(0.5);
    
    drawBtn(this, 425, 75, 'PAUSE', () => pauseGame.call(this));
    setupMobile(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,SHIFT,SPACE');
    gameState = 'PLAY';
}

function createChar(scene, x, y, col, type, id) {
    let container = scene.add.container(x, y);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);

    let skin = (type === 'Ghost' || type === 'Reaper') ? 0x999999 : col;
    let head = scene.add.circle(0, -25, 15, skin);
    let body = scene.add.rectangle(0, 5, 8, 40, skin);
    
    // Weapon Rendering
    let weapon;
    if (type === 'Ghost') weapon = scene.add.circle(0,0,0);
    else if (type === 'Wizard') weapon = scene.add.rectangle(25, 0, 4, 45, 0x663300);
    else if (type === 'Freezer') weapon = scene.add.container(25,0, [scene.add.rectangle(0,0,30,4,0xfff), scene.add.circle(15,0,6,0x00ffff)]);
    else if (type === 'Digger') weapon = scene.add.rectangle(25, 0, 30, 10, 0x888).setAngle(-45);
    else if (type === 'Engineer') weapon = scene.add.rectangle(25, 0, 25, 8, 0x555);
    else weapon = scene.add.rectangle(25, 0, 35, 6, type==='Reaper'?0xffffff:0xccc);

    container.add([head, body, weapon]);
    container.hp = HP_MAP[type]; container.maxHp = HP_MAP[type]; container.type = type; container.id = id;
    container.facing = id === 1 ? 1 : -1; container.atkCD = 0; container.skillCD = 0;
    container.spirit = scene.add.circle(-25, -40, 12, 0x888888, 0.4).setVisible(false);
    container.add(container.spirit);
    
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAY') return;
    matchTimer -= delta/1000;
    timerText.setText(Math.ceil(matchTimer));
    if (matchTimer <= 0) endGame(p1.hp > p2.hp ? "P1" : "P2");

    [p1, p2].forEach(p => {
        p.atkCD -= delta; p.skillCD -= delta;
        if (p.type === 'Reaper' && p.hp < p.maxHp/2) {
            p.spirit.setVisible(true);
            p.list[2].setTint(0xff00ff);
        }
        
        let move = 0;
        let jump = false;
        if (p.id === 1) {
            if (this.keys.A.isDown || p.mLeft) move = -220;
            if (this.keys.D.isDown || p.mRight) move = 220;
            if ((this.keys.W.isDown || p.mJump) && p.body.touching.down) jump = true;
            p.isBlocking = this.keys.SHIFT.isDown || p.mBlock;
        } else {
            if (mode === 2) {
                if (this.keys.LEFT.isDown || p.mLeft) move = -220;
                if (this.keys.RIGHT.isDown || p.mRight) move = 220;
                if ((this.keys.UP.isDown || p.mJump) && p.body.touching.down) jump = true;
                p.isBlocking = this.keys.SPACE.isDown || p.mBlock;
            } else runAI(p, p1);
        }

        if (p.isBlocking) move = 0;
        p.body.setVelocityX(move);
        if (jump) p.body.setVelocityY(-600);
        if (move !== 0) { p.facing = move > 0 ? 1 : -1; p.list[2].scaleX = p.facing; p.list[2].x = 25 * p.facing; }

        if ((p.id===1?this.keys.SHIFT.isDown:this.keys.SPACE.isDown) && p.atkCD <= 0) useAtk(p, p===p1?p2:p1);
    });

    this.p1Bar.width = Math.max(0, p1.hp/p1.maxHp * 200);
    this.p2Bar.width = Math.max(0, p2.hp/p2.maxHp * 200);
    if (p1.hp <= 0 || p2.hp <= 0) endGame(p1.hp <= 0 ? "P2" : "P1");
}

function useAtk(p, t) {
    p.atkCD = 600;
    p.scene.tweens.add({ targets: p.list[2], angle: p.facing*60, duration: 100, yoyo: true });
    if (Phaser.Math.Distance.Between(p.x, p.y, t.x, t.y) < 70) {
        let d = 8;
        if (p.type === 'Reaper' && p.hp < p.maxHp/2) d = 16;
        t.hp -= (t.isBlocking ? d*0.2 : d);
    }
    
    if (p.skillCD <= 0) {
        p.skillCD = 8000;
        if (p.type === 'Ghost' || (p.type === 'Reaper' && p.hp < p.maxHp/2)) {
            let b = p.scene.add.rectangle(p.x + (400*p.facing), p.y, 800, 30, p.type==='Ghost'?0x00ffff:0xff00ff);
            p.scene.physics.add.existing(b); b.body.setAllowGravity(false);
            b.owner = p.id; b.isBeam = true; b.dmg = 0.5; b.launcher = p;
            projectiles.add(b); p.scene.time.delayedCall(1500, () => b.destroy());
        } else if (p.type === 'Wizard') {
            let f = p.scene.add.circle(p.x, p.y, 15, 0xff4400);
            p.scene.physics.add.existing(f); f.body.setAllowGravity(false).setVelocityX(p.facing * 450);
            f.owner = p.id; projectiles.add(f);
        } else if (p.type === 'Reaper') p.hp = Math.min(p.maxHp, p.hp + 15);
    }
}

function pauseGame() {
    this.physics.pause(); gameState = 'PAUSE';
    let layer = this.add.container(0, 0).setDepth(1000);
    let bg = this.add.rectangle(425, 240, 850, 480, 0x000, 0.7);
    let res = this.add.text(425, 200, 'RESUME', { backgroundColor: '#333', padding: 10 }).setOrigin(0.5).setInteractive();
    let qui = this.add.text(425, 280, 'QUIT', { backgroundColor: '#333', padding: 10 }).setOrigin(0.5).setInteractive();
    layer.add([bg, res, qui]);
    res.on('pointerdown', () => { this.physics.resume(); gameState = 'PLAY'; layer.destroy(); });
    qui.on('pointerdown', () => { location.reload(); });
}

function setupMobile(scene) {
    const btn = (x, y, txt, cb) => {
        let b = scene.add.circle(x, y, 35, 0xfff, 0.2).setInteractive().setDepth(500);
        scene.add.text(x, y, txt).setOrigin(0.5).setDepth(501);
        b.on('pointerdown', () => cb(true)); b.on('pointerup', () => cb(false));
        b.on('pointerout', () => cb(false));
    };
    btn(60, 400, 'L', v => p1.mLeft = v); btn(150, 400, 'R', v => p1.mRight = v);
    btn(105, 320, 'J', v => p1.mJump = v); btn(260, 400, 'A', v => { if(v) useAtk(p1, p2); });
    btn(340, 400, 'B', v => p1.mBlock = v);
    if (mode === 2) {
        btn(790, 400, 'R', v => p2.mRight = v); btn(700, 400, 'L', v => p2.mLeft = v);
        btn(745, 320, 'J', v => p2.mJump = v); btn(590, 400, 'A', v => { if(v) useAtk(p2, p1); });
        btn(510, 400, 'B', v => p2.mBlock = v);
    }
}

function drawBtn(scene, x, y, txt, cb, col='#333') {
    let b = scene.add.text(x, y, txt, { backgroundColor: col, padding: 10 }).setOrigin(0.5).setInteractive();
    b.on('pointerdown', cb);
}

function endGame(winner) {
    gameState = 'END';
    game.scene.scenes[0].add.text(425, 240, winner + " WINS!", {fontSize:'60px', color:'#fff'}).setOrigin(0.5);
    setTimeout(() => location.reload(), 3000);
}

function runAI(c, t) {
    let d = Math.abs(c.x - t.x);
    if (d > 130) c.body.setVelocityX(c.x > t.x ? -180 : 180);
    else { c.body.setVelocityX(0); useAtk(c, t); }
}
</script>
</body>
</html>
