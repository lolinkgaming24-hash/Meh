<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Eternal Legends</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; border: 2px solid #333; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 5 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1400 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, matchTimer, timerText, gameState = 'MENU', mode = 1, p1Type, p2Type, uiLayer;
const HP_MAP = { Swordman:120, Wizard:80, Bomber:100, Digger:90, Engineer:110, Freezer:100, Ghost:160, Reaper:140 };
const CLASSES = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Engineer', 'Freezer'];

function preload() {}

function create() {
    this.input.addPointer(3); // Enable multi-touch for mobile
    projectiles = this.physics.add.group();
    showMenu.call(this);
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN BRAWLER', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    drawBtn(this, 425, 220, '1 PLAYER (VS CPU)', () => { mode = 1; selectChar.call(this, 1); });
    drawBtn(this, 425, 310, '2 PLAYERS (LOCAL)', () => { mode = 2; selectChar.call(this, 1); });
}

function selectChar(pNum) {
    this.children.removeAll();
    this.add.text(425, 40, `PLAYER ${pNum}: SELECT CLASS`, { fontSize: '26px', color: pNum===1?'#0f0':'#f00' }).setOrigin(0.5);
    CLASSES.forEach((name, i) => {
        drawBtn(this, 425, 90 + (i * 42), name, () => { 
            if(pNum === 1) { p1Type = name; mode === 2 ? selectChar.call(this, 2) : (p2Type = 'Random', startGame.call(this)); }
            else { p2Type = name; startGame.call(this); }
        });
    });
    drawBtn(this, 425, 380, '?? RANDOM ??', () => {
        if(pNum === 1) { p1Type = 'Random'; mode === 2 ? selectChar.call(this, 2) : (p2Type = 'Random', startGame.call(this)); }
        else { p2Type = 'Random'; startGame.call(this); }
    }, '#660');
}

function roll(type) {
    if (type !== 'Random') return type;
    let r = Math.random();
    if (r < 0.15) return 'Ghost';
    if (r < 0.30) return 'Reaper';
    return CLASSES[Math.floor(Math.random() * CLASSES.length)];
}

function startGame() {
    this.children.removeAll();
    projectiles.clear(true, true);
    matchTimer = 90;

    let c1 = roll(p1Type);
    let c2 = roll(p2Type);

    // GHOST VS REAPER COUNTER-PICK LOGIC
    if (c1 === 'Ghost') c2 = 'Reaper';
    else if (c2 === 'Ghost') c1 = 'Reaper';

    p1 = createStickman(this, 150, 300, 0x00ff00, c1, 1);
    p2 = createStickman(this, 700, 300, 0xff0000, c2, 2);

    let floor = this.add.rectangle(425, 470, 850, 20, 0x333);
    this.physics.add.existing(floor, true);
    this.physics.add.collider([p1, p2], floor);

    // Combat Overlaps
    this.physics.add.overlap(projectiles, [p1, p2], (target, proj) => {
        if (proj.owner === target.id) return;
        let dmg = proj.dmg || 20;
        
        if (proj.isBeam) {
            // Check for Beam Clash
            let clash = projectiles.getChildren().find(b => b.isBeam && b.owner !== proj.owner && Phaser.Geom.Intersects.RectangleToRectangle(proj.getBounds(), b.getBounds()));
            if (clash) {
                dmg = 0; 
                let spark = this.add.circle(proj.x + (200 * proj.launcher.facing), proj.y, 4, 0xffffff);
                this.tweens.add({targets: spark, alpha:0, scale:2, duration:100, onComplete:()=>spark.destroy()});
            }
        }
        
        target.hp -= (target.isBlocking ? dmg * 0.15 : dmg);
        if (!proj.isBeam) proj.destroy();
    });

    this.p1Bar = this.add.rectangle(20, 30, 200, 20, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 30, 200, 20, 0xff0000).setOrigin(1, 0);
    timerText = this.add.text(425, 30, '90', { fontSize: '32px', fontStyle: 'bold' }).setOrigin(0.5);
    
    drawBtn(this, 425, 75, 'PAUSE', () => pauseGame.call(this));
    setupMobileUI(this);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,SHIFT,SPACE');
    gameState = 'PLAY';
}

function createStickman(scene, x, y, col, type, id) {
    let container = scene.add.container(x, y);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 70);

    let skin = (type === 'Ghost' || type === 'Reaper') ? 0xaaaaaa : col;
    let head = scene.add.circle(0, -25, 15, skin);
    let body = scene.add.rectangle(0, 5, 8, 40, skin);
    
    // BUILD DETAILED WEAPON SPRITES
    let weapon = scene.add.container(25, 0);
    if (type === 'Wizard') {
        weapon.add([
            scene.add.rectangle(0, 0, 6, 55, 0x5d3a1a), // Staff
            scene.add.circle(0, -28, 10, 0x00ffff, 0.8), // Gem
            scene.add.circle(0, -28, 5, 0xffffff) // Core
        ]);
    } else if (type === 'Engineer') {
        weapon.add([
            scene.add.rectangle(0, 0, 20, 8, 0x777777), // Handle
            scene.add.rectangle(15, 0, 10, 25, 0x999999) // Wrench Head
        ]);
    } else if (type === 'Digger') {
        weapon.add([
            scene.add.rectangle(0, 0, 35, 6, 0x442211), // Handle
            scene.add.rectangle(30, 0, 10, 30, 0x888888).setAngle(45) // Pickaxe
        ]);
    } else if (type === 'Freezer') {
        weapon.add([
            scene.add.rectangle(0, 0, 30, 4, 0xaaaaaa), // Wand
            scene.add.star(30, 0, 6, 6, 12, 0x00ffff) // Snowflake
        ]);
    } else if (type === 'Ghost') {
        weapon.setVisible(false); // Fists only
    } else {
        // Swordman or Reaper
        weapon.add([
            scene.add.rectangle(0, 0, 45, 8, type==='Reaper'?0xffffff:0xdddddd), // Blade
            scene.add.rectangle(-20, 0, 6, 15, 0x444444) // Guard
        ]);
    }

    container.add([head, body, weapon]);
    container.hp = HP_MAP[type]; container.maxHp = HP_MAP[type]; container.type = type; container.id = id;
    container.facing = id === 1 ? 1 : -1; container.atkCD = 0; container.skillCD = 0;
    container.spirit = scene.add.circle(-25, -45, 12, 0xff00ff, 0.4).setVisible(false);
    container.add(container.spirit);
    
    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAY') return;
    matchTimer -= delta/1000;
    timerText.setText(Math.ceil(matchTimer));
    if (matchTimer <= 0) endGame(p1.hp > p2.hp ? "PLAYER 1" : "PLAYER 2");

    [p1, p2].forEach(p => {
        p.atkCD -= delta; p.skillCD -= delta;
        
        // Reaper Awakening
        if (p.type === 'Reaper' && p.hp < p.maxHp/2) {
            p.spirit.setVisible(true);
            p.list[2].setTint(0xff00ff);
        }

        let move = 0; let jump = false;
        if (p.id === 1) {
            if (this.keys.A.isDown || p.mLeft) move = -230;
            if (this.keys.D.isDown || p.mRight) move = 230;
            if ((this.keys.W.isDown || p.mJump) && p.body.touching.down) jump = true;
            p.isBlocking = (this.keys.SHIFT.isDown || p.mBlock);
        } else {
            if (mode === 2) {
                if (this.keys.LEFT.isDown || p.mLeft) move = -230;
                if (this.keys.RIGHT.isDown || p.mRight) move = 230;
                if ((this.keys.UP.isDown || p.mJump) && p.body.touching.down) jump = true;
                p.isBlocking = (this.keys.SPACE.isDown || p.mBlock);
            } else runSimpleAI(p, p1);
        }

        p.body.setVelocityX(p.isBlocking ? 0 : move);
        if (jump) p.body.setVelocityY(-620);
        if (move !== 0) { 
            p.facing = move > 0 ? 1 : -1; 
            p.list[2].scaleX = p.facing; 
            p.list[2].x = 25 * p.facing; 
        }

        if ((p.id===1?this.keys.SHIFT.isDown:this.keys.SPACE.isDown) && p.atkCD <= 0) handleAtk(p, p===p1?p2:p1);
    });

    // Hard-lock Beam to player Y
    projectiles.getChildren().forEach(proj => {
        if (proj.isBeam) {
            proj.y = proj.launcher.y;
            proj.x = proj.launcher.x + (400 * proj.launcher.facing);
        }
    });

    this.p1Bar.width = Math.max(0, p1.hp/p1.maxHp * 200);
    this.p2Bar.width = Math.max(0, p2.hp/p2.maxHp * 200);
    if (p1.hp <= 0 || p2.hp <= 0) endGame(p1.hp <= 0 ? "PLAYER 2" : "PLAYER 1");
}

function handleAtk(p, target) {
    p.atkCD = 600;
    p.scene.tweens.add({ targets: p.list[2], angle: p.facing*70, duration: 120, yoyo: true });
    
    if (Phaser.Math.Distance.Between(p.x, p.y, target.x, target.y) < 80) {
        let d = (p.type === 'Reaper' && p.hp < p.maxHp/2) ? 22 : 11;
        target.hp -= (target.isBlocking ? d*0.2 : d);
    }
    
    if (p.skillCD <= 0) {
        p.skillCD = 8000;
        if (p.type === 'Ghost' || (p.type === 'Reaper' && p.hp < p.maxHp/2)) {
            let b = p.scene.add.rectangle(0, 0, 800, 40, p.type==='Ghost'?0x00ffff:0xff00ff, 0.6);
            p.scene.physics.add.existing(b); 
            b.body.setAllowGravity(false).setImmovable(true);
            b.owner = p.id; b.isBeam = true; b.dmg = 2.5; b.launcher = p;
            projectiles.add(b);
            p.scene.time.delayedCall(1500, () => b.destroy());
        } else if (p.type === 'Wizard') {
            let f = p.scene.add.circle(p.x, p.y, 16, 0xff4400);
            p.scene.physics.add.existing(f);
            f.body.setAllowGravity(false).setVelocityX(p.facing * 500);
            f.owner = p.id; projectiles.add(f);
        } else if (p.type === 'Reaper') {
            p.hp = Math.min(p.maxHp, p.hp + 25);
        }
    }
}

function pauseGame() {
    this.physics.pause(); gameState = 'PAUSE';
    uiLayer = this.add.container(0, 0).setDepth(3000);
    let bg = this.add.rectangle(425, 240, 850, 480, 0x000, 0.75);
    let res = this.add.text(425, 200, 'RESUME', { backgroundColor: '#444', padding: 15, fontSize: '24px' }).setOrigin(0.5).setInteractive();
    let qui = this.add.text(425, 280, 'QUIT', { backgroundColor: '#444', padding: 15, fontSize: '24px' }).setOrigin(0.5).setInteractive();
    uiLayer.add([bg, res, qui]);
    
    res.on('pointerdown', () => { this.physics.resume(); gameState = 'PLAY'; uiLayer.destroy(); });
    qui.on('pointerdown', () => { location.reload(); });
}

function setupMobileUI(scene) {
    const makeBtn = (x, y, txt, cb) => {
        let circle = scene.add.circle(x, y, 40, 0xffffff, 0.2).setInteractive().setDepth(2000);
        scene.add.text(x, y, txt, {fontSize:'20px'}).setOrigin(0.5).setDepth(2001);
        circle.on('pointerdown', () => cb(true));
        circle.on('pointerup', () => cb(false));
        circle.on('pointerout', () => cb(false));
    };
    // P1 Controls
    makeBtn(70, 410, 'L', v => p1.mLeft = v); makeBtn(170, 410, 'R', v => p1.mRight = v);
    makeBtn(120, 330, 'J', v => p1.mJump = v); makeBtn(280, 410, 'A', v => { if(v) handleAtk(p1, p2); });
    makeBtn(370, 410, 'B', v => p1.mBlock = v);
    // P2 Controls
    if (mode === 2) {
        makeBtn(780, 410, 'R', v => p2.mRight = v); makeBtn(680, 410, 'L', v => p2.mLeft = v);
        makeBtn(730, 330, 'J', v => p2.mJump = v); makeBtn(570, 410, 'A', v => { if(v) handleAtk(p2, p1); });
        makeBtn(480, 410, 'B', v => p2.mBlock = v);
    }
}

function drawBtn(scene, x, y, txt, cb, col='#333') {
    let b = scene.add.text(x, y, txt, { backgroundColor: col, padding: 10, fontSize: '20px' }).setOrigin(0.5).setInteractive();
    b.on('pointerdown', cb);
}

function endGame(winner) {
    gameState = 'END';
    game.scene.scenes[0].add.text(425, 240, winner + " WINS!", {fontSize:'55px', color:'#fff', backgroundColor:'#000'}).setOrigin(0.5);
    setTimeout(() => location.reload(), 3000);
}

function runSimpleAI(c, t) {
    let d = Math.abs(c.x - t.x);
    if (d > 140) c.body.setVelocityX(c.x > t.x ? -180 : 180);
    else { c.body.setVelocityX(0); handleAtk(c, t); }
    if (t.y < c.y - 50 && c.body.touching.down) c.body.setVelocityY(-600);
}
</script>
</body>
</html>
