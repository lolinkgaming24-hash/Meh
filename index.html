<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jujutsu Sendai: Absolute Stability</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; margin: 0 auto; border: 2px solid #333; }
    </style>
</head>
<body>
<script>
/** * ENGINE CONFIGURATION 
 * Supports 5+ simultaneous touch points.
 */
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    backgroundColor: '#050505',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { activePointers: 10 }, 
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 2000 }, debug: false, tileBias: 32 } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let p1, p2, projectiles, floor, timerText, matchTimer, gameState = 'MENU', mode = 1;
let p1Type, p2Type, p1IsRand = false, p2IsRand = false;

function preload() {}

function create() {
    projectiles = this.physics.add.group({ allowGravity: false });
    showMainMenu.call(this);
}

function showMainMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 120, 'STICKMAN: SENDAI COLONY', { fontSize: '42px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    
    const createBtn = (y, txt, clr, cb) => {
        let b = this.add.container(425, y);
        let bg = this.add.rectangle(0, 0, 320, 50, clr).setInteractive();
        let t = this.add.text(0, 0, txt, { fontSize: '24px' }).setOrigin(0.5);
        bg.on('pointerdown', cb);
        b.add([bg, t]);
    };

    createBtn(260, '1 PLAYER (VS AI)', 0x2ecc71, () => { mode = 1; showSelect.call(this, 1); });
    createBtn(340, '2 PLAYER (LOCAL)', 0x3498db, () => { mode = 2; showSelect.call(this, 1); });
}

function showSelect(pNum) {
    this.children.removeAll();
    this.add.text(425, 40, `SELECT PLAYER ${pNum}`, { fontSize: '30px', color: '#fff' }).setOrigin(0.5);
    const classes = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Freezer', '?? RANDOM ??'];
    
    classes.forEach((name, i) => {
        let btn = this.add.text(425, 100 + (i * 50), name, { 
            fontSize: '22px', backgroundColor: '#1a1a1a', padding: 10, minWidth: 250, align: 'center' 
        }).setOrigin(0.5).setInteractive();
        
        btn.on('pointerdown', () => {
            let selectedType = name;
            let randomFlag = false;
            if (name === '?? RANDOM ??') {
                randomFlag = true;
                selectedType = Math.random() < 0.1 ? 'Ghost' : classes[Math.floor(Math.random() * 5)];
            }

            if (pNum === 1) {
                p1Type = selectedType; p1IsRand = randomFlag;
                mode === 2 ? showSelect.call(this, 2) : (p2Type = (p1Type === 'Ghost' ? 'Reaper' : 'Wizard'), startMatch.call(this));
            } else {
                p2Type = (p1Type === 'Ghost') ? 'Reaper' : (p1Type === 'Reaper' ? 'Ghost' : selectedType);
                p2IsRand = randomFlag;
                startMatch.call(this);
            }
        });
    });
}

function startMatch() {
    this.children.removeAll();
    projectiles.clear(true, true);
    matchTimer = 90;

    // SOLID FLOOR LOGIC
    floor = this.add.rectangle(425, 470, 850, 20, 0x444444);
    this.physics.add.existing(floor, true);

    p1 = spawnPlayer(this, 150, 400, p1Type, 1);
    p2 = spawnPlayer(this, 700, 400, p2Type, 2);

    // CORE COLLIDERS
    this.physics.add.collider([p1, p2], floor);
    this.physics.add.collider(projectiles, floor); // Keeps bombs on top

    this.physics.add.overlap(projectiles, [p1, p2], (victim, bullet) => {
        if (bullet.owner === victim.id) return;
        let finalDmg = bullet.dmg;
        if (victim.isBlocking) finalDmg *= 0.15;
        victim.hp -= finalDmg;
        if (!bullet.isBeam) bullet.destroy();
    });

    this.p1HP = this.add.rectangle(20, 30, 250, 15, 0x00ff00).setOrigin(0);
    this.p2HP = this.add.rectangle(830, 30, 250, 15, 0xff0000).setOrigin(1, 0);
    timerText = this.add.text(425, 35, '90', { fontSize: '36px', fontStyle: 'bold' }).setOrigin(0.5);

    createUIControls(this);
    runMatchStart.call(this);
}

function runMatchStart() {
    gameState = 'COUNT';
    this.physics.pause();
    let count = 3;
    let t = this.add.text(425, 240, '3', { fontSize: '120px' }).setOrigin(0.5);
    this.time.addEvent({ delay: 1000, repeat: 3, callback: () => {
        count--;
        if (count > 0) t.setText(count);
        else if (count === 0) t.setText('FIGHT!');
        else { t.destroy(); this.physics.resume(); gameState = 'PLAY'; }
    }});
}

function spawnPlayer(scene, x, y, type, id) {
    const p = scene.add.container(x, y);
    scene.physics.add.existing(p);
    p.body.setCollideWorldBounds(true).setSize(40, 75).setOffset(-20, -37);
    
    const color = (id === 1) ? 0x00ff00 : 0xff0000;
    const bodyParts = [
        scene.add.circle(0, -28, 15, color), // Head
        scene.add.rectangle(0, 5, 12, 45, color), // Body
        scene.add.container(22, 5) // Weapon Container
    ];

    // Visual Weapon Sprites
    if (type === 'Wizard') bodyParts[2].add([scene.add.rectangle(0,0,6,60,0x5d3a1a), scene.add.circle(0,-30,10,0xff0000)]);
    else if (type === 'Digger') bodyParts[2].add([scene.add.rectangle(0,0,6,40,0x444), scene.add.rectangle(0,-20,30,8,0x777)]);
    else if (type === 'Freezer') bodyParts[2].add(scene.add.rectangle(0,0,45,15,0x00ffff));
    else bodyParts[2].add(scene.add.rectangle(0,0,45,6,0xcccccc));

    p.add(bodyParts);
    p.id = id; p.type = type; p.hp = 100; p.facing = (id === 1 ? 1 : -1);
    p.atkCD = 0; p.sklCD = 0; p.isBlocking = false; p.stunned = false;
    
    // Control States
    p.ctrl = { L: false, R: false, J: false };
    return p;
}

function handleSkill(p, t) {
    if (p.sklCD > 0 || p.stunned || gameState !== 'PLAY') return;
    p.sklCD = 5000;
    const s = p.scene;

    if (p.type === 'Wizard' || p.type === 'Freezer') {
        let proj = s.add.circle(p.x, p.y, 16, p.type === 'Wizard' ? 0xff6600 : 0x00ffff);
        s.physics.add.existing(proj);
        proj.body.allowGravity = false;
        proj.body.setVelocityX(p.facing * 650);
        proj.owner = p.id; proj.dmg = (p.type === 'Wizard' ? 30 : 12);
        projectiles.add(proj);
        if (p.type === 'Freezer') {
            s.physics.add.overlap(proj, t, () => {
                t.stunned = true; t.alpha = 0.5;
                s.time.delayedCall(3000, () => { t.stunned = false; t.alpha = 1; });
                proj.destroy();
            });
        }
    } else if (p.type === 'Bomber') {
        let b = s.add.circle(p.x, p.y, 14, 0x111111);
        s.physics.add.existing(b);
        b.body.setGravityY(2000).setVelocity(p.facing * 450, -900).setBounce(0.6).setCollideWorldBounds(true);
        projectiles.add(b);
        s.time.delayedCall(1600, () => {
            let dist = Phaser.Math.Distance.Between(b.x, b.y, t.x, t.y);
            if (dist < 150) t.hp -= 45;
            b.destroy();
        });
    } else if (p.type === 'Ghost' || p.type === 'Reaper') {
        let beam = s.add.rectangle(p.x + (400 * p.facing), p.y, 800, 50, p.type === 'Ghost' ? 0x00ffff : 0xff00ff, 0.6);
        s.physics.add.existing(beam); beam.body.allowGravity = false;
        beam.owner = p.id; beam.isBeam = true; beam.dmg = 60; projectiles.add(beam);
        s.time.delayedCall(600, () => beam.destroy());
    } else {
        s.tweens.add({ targets: p, x: p.x + (250 * p.facing), duration: 250 });
        if (Math.abs(p.x - t.x) < 260) t.hp -= 25;
    }
}

function update(time, delta) {
    if (gameState !== 'PLAY') return;
    matchTimer -= delta / 1000;
    timerText.setText(Math.ceil(matchTimer));

    [p1, p2].forEach(p => {
        p.atkCD -= delta; p.sklCD -= delta;
        let vx = 0;
        if (!p.stunned) {
            if (p.id === 2 && mode === 1) runAI(p, p1);
            if (p.isBlocking) { vx = 0; } 
            else {
                if (p.ctrl.L) vx = -280; else if (p.ctrl.R) vx = 280;
                if (p.ctrl.J && p.body.touching.down) p.body.setVelocityY(-900);
            }
        }
        p.body.setVelocityX(vx);
        if (vx !== 0) { p.facing = vx > 0 ? 1 : -1; p.list[2].scaleX = p.facing; p.list[2].x = 22 * p.facing; }
    });

    this.p1HP.width = (p1.hp / 100) * 250;
    this.p2HP.width = (p2.hp / 100) * 250;
    if (p1.hp <= 0 || p2.hp <= 0 || matchTimer <= 0) endMatch.call(this);
}

function runAI(c, t) {
    let d = Math.abs(c.x - t.x);
    c.ctrl.L = c.x > t.x + 80;
    c.ctrl.R = c.x < t.x - 80;
    if (d < 120) {
        if (c.atkCD <= 0) { c.atkCD = 500; t.hp -= 5; c.scene.tweens.add({targets: c.list[2], angle: c.facing*80, duration: 100, yoyo: true}); }
        if (Math.random() < 0.015) handleSkill(c, t);
    }
}

function createUIControls(scene) {
    const makeBtn = (x, y, txt, p, key) => {
        let b = scene.add.circle(x, y, 42, 0xffffff, 0.2).setInteractive().setDepth(5000);
        scene.add.text(x, y, txt).setOrigin(0.5);
        b.on('pointerdown', () => {
            if (key === 'A') { if(p.atkCD <= 0) { p.atkCD = 450; (p.id === 1 ? p2 : p1).hp -= 5; scene.tweens.add({targets: p.list[2], angle: p.facing*80, duration: 100, yoyo: true}); } }
            else if (key === 'S') handleSkill(p, (p.id === 1 ? p2 : p1));
            else if (key === 'B') p.isBlocking = true;
            else p.ctrl[key] = true;
        });
        b.on('pointerup', () => { if(key === 'B') p.isBlocking = false; else if (p.ctrl[key] !== undefined) p.ctrl[key] = false; });
        b.on('pointerout', () => { if(key === 'B') p.isBlocking = false; else if (p.ctrl[key] !== undefined) p.ctrl[key] = false; });
    };

    // P1 Controls
    makeBtn(60, 400, 'L', p1, 'L'); makeBtn(150, 400, 'R', p1, 'R'); makeBtn(105, 315, 'J', p1, 'J');
    makeBtn(260, 400, 'A', p1, 'A'); makeBtn(350, 400, 'S', p1, 'S'); makeBtn(305, 315, 'B', p1, 'B');

    if (mode === 2) {
        // P2 Controls
        makeBtn(790, 400, 'R', p2, 'R'); makeBtn(700, 400, 'L', p2, 'L'); makeBtn(745, 315, 'J', p2, 'J');
        makeBtn(590, 400, 'A', p2, 'A'); makeBtn(500, 400, 'S', p2, 'S'); makeBtn(545, 315, 'B', p2, 'B');
    }
}

function endMatch() {
    gameState = 'END'; this.physics.pause();
    const ui = this.add.container(0, 0).setDepth(10000);
    ui.add([this.add.rectangle(425, 240, 850, 480, 0x000, 0.8), this.add.text(425, 150, 'MATCH OVER', { fontSize: '60px' }).setOrigin(0.5)]);
    
    let rb = this.add.text(425, 260, 'REMATCH', { backgroundColor: '#2ecc71', padding: 15 }).setOrigin(0.5).setInteractive();
    rb.on('pointerdown', () => {
        const pool = ['Swordman', 'Wizard', 'Bomber', 'Digger', 'Freezer'];
        if (p1IsRand) p1Type = Math.random() < 0.1 ? 'Ghost' : pool[Math.floor(Math.random() * 5)];
        if (p2IsRand) p2Type = (p1Type === 'Ghost' ? 'Reaper' : pool[Math.floor(Math.random() * 5)]);
        startMatch.call(this);
    });

    let mb = this.add.text(425, 340, 'EXIT TO MENU', { backgroundColor: '#e74c3c', padding: 15 }).setOrigin(0.5).setInteractive();
    mb.on('pointerdown', () => location.reload());
}
</script>
</body>
</html>
