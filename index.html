<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Brawler: Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
/** * GAME CONFIGURATION 
 * Explicitly set to 60fps for collision consistency 
 */
const config = {
    type: Phaser.AUTO,
    width: 850,
    height: 480,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 1500 },
            fps: 60,
            overlapBias: 8 // Prevents high-speed tunneling
        }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let p1, p2, bullets, ground, gameState = 'MENU', mode = 1;
let selections = { p1: 'Swordman', p2: 'Swordman' };
const CLASSES = ['Swordman', 'Gunman', 'Bomber', 'Digger', 'Engineer'];

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0f0f13');
    bullets = this.physics.add.group({ allowGravity: false });
    showMenu.call(this);
}

// --- UI SYSTEMS ---

function createMenuBtn(scene, x, y, text, callback) {
    let btn = scene.add.text(x, y, text, {
        fontSize: '24px',
        backgroundColor: '#222',
        padding: { x: 20, y: 10 },
        color: '#fff',
        fixedWidth: 300,
        align: 'center'
    }).setOrigin(0.5).setInteractive();

    btn.on('pointerover', () => btn.setStyle({ backgroundColor: '#444' }));
    btn.on('pointerout', () => btn.setStyle({ backgroundColor: '#222' }));
    btn.on('pointerdown', callback);
    return btn;
}

function showMenu() {
    gameState = 'MENU';
    this.children.removeAll();
    this.add.text(425, 100, 'STICKMAN PRO BRAWLER', { fontSize: '48px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5);
    
    createMenuBtn(this, 425, 220, '1 PLAYER (VS CPU)', () => { mode = 1; selectClass.call(this, 1); });
    createMenuBtn(this, 425, 300, '2 PLAYERS (LOCAL)', () => { mode = 2; selectClass.call(this, 1); });
}

function selectClass(playerNum) {
    this.children.removeAll();
    let title = playerNum === 1 ? 'P1: SELECT YOUR HERO' : 'P2: SELECT YOUR HERO';
    this.add.text(425, 50, title, { fontSize: '32px', fill: playerNum === 1 ? '#0f0' : '#f00' }).setOrigin(0.5);

    CLASSES.forEach((className, i) => {
        createMenuBtn(this, 425, 120 + (i * 50), className, () => {
            if (playerNum === 1) {
                selections.p1 = className;
                if (mode === 2) selectClass.call(this, 2);
                else { selections.p2 = 'Random'; startMatch.call(this); }
            } else {
                selections.p2 = className;
                startMatch.call(this);
            }
        });
    });

    let rndBtn = createMenuBtn(this, 425, 380, '?? RANDOM ??', () => {
        if (playerNum === 1) {
            selections.p1 = 'Random';
            if (mode === 2) selectClass.call(this, 2);
            else { selections.p2 = 'Random'; startMatch.call(this); }
        } else {
            selections.p2 = 'Random';
            startMatch.call(this);
        }
    });
    rndBtn.setStyle({ color: '#ff0', backgroundColor: '#330' });
}

// --- CORE GAME ENGINE ---

function startMatch() {
    this.children.removeAll();
    bullets.clear(true, true);

    ground = this.add.rectangle(425, 470, 850, 20, 0x22222a);
    this.physics.add.existing(ground, true);

    // Resolve Randoms
    let c1 = selections.p1 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p1;
    let c2 = selections.p2 === 'Random' ? CLASSES[Math.floor(Math.random()*5)] : selections.p2;

    p1 = createStickman(this, 150, 300, 0x00ff00, c1, 1);
    p2 = createStickman(this, 700, 300, 0xff0000, c2, 2);

    this.physics.add.collider([p1, p2], ground);

    // CRITICAL: Robust Damage Listener
    this.physics.add.overlap(bullets, [p1, p2], (target, bullet) => {
        if (bullet.ownerId !== target.id) {
            applyDamage(bullet.launcher, target, bullet.damage);
            bullet.destroy();
        }
    });

    // HUD
    this.p1Bar = this.add.rectangle(20, 30, 250, 15, 0x00ff00).setOrigin(0);
    this.p2Bar = this.add.rectangle(830, 30, 250, 15, 0xff0000).setOrigin(1, 0);
    
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT,DOWN');
    setupMobileControls.call(this);

    // Start-up Fix
    gameState = 'COUNTDOWN';
    this.physics.pause();
    let count = 3;
    let readyTxt = this.add.text(425, 200, '3', { fontSize: '80px', fontStyle: 'bold' }).setOrigin(0.5);
    
    this.time.addEvent({
        delay: 1000,
        repeat: 3,
        callback: () => {
            count--;
            if (count > 0) readyTxt.setText(count);
            else if (count === 0) {
                readyTxt.setText('FIGHT!');
                this.physics.resume();
                gameState = 'PLAYING';
            } else {
                readyTxt.destroy();
            }
        }
    });
}

function createStickman(scene, x, y, color, type, id) {
    let container = scene.add.container(x, y);
    
    // Procedural Rigging
    let head = scene.add.circle(0, -50, 12, 0xffffff).setStrokeStyle(2, color);
    let torso = scene.add.line(0, 0, 0, -38, 0, 0, color).setLineWidth(4).setOrigin(0);
    let armL = scene.add.line(0, -32, 0, 0, 0, 20, color).setLineWidth(3).setOrigin(0);
    let armR = scene.add.line(0, -32, 0, 0, 0, 20, color).setLineWidth(3).setOrigin(0);
    let legL = scene.add.line(0, 0, 0, 0, 0, 24, color).setLineWidth(3).setOrigin(0);
    let legR = scene.add.line(0, 0, 0, 0, 0, 24, color).setLineWidth(3).setOrigin(0);

    let weapon;
    if (type === 'Gunman') weapon = scene.add.rectangle(18, -2, 28, 8, 0x444).setOrigin(0, 0.5);
    else if (type === 'Swordman') weapon = scene.add.rectangle(18, -2, 45, 5, 0xddd).setOrigin(0, 0.5);
    else weapon = scene.add.circle(18, -2, 10, 0x666);

    container.add([legL, legR, torso, armL, armR, head, weapon]);
    scene.physics.add.existing(container);
    container.body.setCollideWorldBounds(true).setSize(40, 85).setOffset(-20, -65);
    
    container.id = id;
    container.hp = 100;
    container.type = type;
    container.facing = id === 1 ? 1 : -1;
    container.atkCD = 0;
    container.walkCycle = 0;

    return container;
}

function update(time, delta) {
    if (gameState !== 'PLAYING') return;

    // Player 1 Input
    handleMovement(p1, this.keys.A, this.keys.D, this.keys.W);
    
    // Player 2 / AI Input
    if (mode === 2) {
        handleMovement(p2, this.keys.LEFT, this.keys.RIGHT, this.keys.UP);
    } else {
        handleAI(p2, p1);
    }

    // Animation & Cooldowns
    [p1, p2].forEach(p => {
        animateStickman(p, delta);
        p.atkCD = Math.max(0, p.atkCD - delta);
    });

    // UI Updates
    this.p1Bar.width = Math.max(0, p1.hp) * 2.5;
    this.p2Bar.width = Math.max(0, p2.hp) * 2.5;

    if (p1.hp <= 0 || p2.hp <= 0) endGame.call(this, p1.hp <= 0 ? "RED PLAYER" : "GREEN PLAYER");
}

// --- ANIMATION SYSTEM ---

function animateStickman(p, delta) {
    let moving = Math.abs(p.body.velocity.x) > 10;
    let jumping = !p.body.touching.down;
    
    p.scaleX = p.facing;

    if (moving && !jumping) {
        p.walkCycle += delta * 0.015;
        p.list[0].setTo(0, 0, Math.sin(p.walkCycle) * 15, 24); // Leg L
        p.list[1].setTo(0, 0, Math.cos(p.walkCycle) * 15, 24); // Leg R
        p.list[3].setTo(0, -32, Math.cos(p.walkCycle) * 10, 10); // Arm L
    } else if (jumping) {
        p.list[0].setTo(0, 0, -10, 15);
        p.list[1].setTo(0, 0, 10, 15);
    } else {
        p.list[0].setTo(0, 0, -5, 24);
        p.list[1].setTo(0, 0, 5, 24);
    }

    // Weapon Positioning
    if (p.atkCD > 400) {
        p.list[4].setTo(0, -32, 25, 0); // Thrust arm
        p.list[6].x = 25;
    } else {
        p.list[4].setTo(0, -32, 12, 15); // Rest arm
        p.list[6].x = 15;
    }
}

// --- COMBAT & PHYSICS ---

function handleMovement(p, l, r, u) {
    let speed = 280;
    if (l.isDown || p.mLeft) { p.body.setVelocityX(-speed); p.facing = -1; }
    else if (r.isDown || p.mRight) { p.body.setVelocityX(speed); p.facing = 1; }
    else p.body.setVelocityX(0);

    if ((u.isDown || p.mUp) && p.body.touching.down) p.body.setVelocityY(-700);
}

function handleAI(cpu, target) {
    let dist = Math.abs(cpu.x - target.x);
    let idealDist = cpu.type === 'Gunman' ? 350 : 70;

    if (dist > idealDist + 40) {
        cpu.body.setVelocityX(cpu.x > target.x ? -180 : 180);
        cpu.facing = cpu.x > target.x ? -1 : 1;
    } else if (dist < idealDist - 40) {
        cpu.body.setVelocityX(cpu.x > target.x ? 180 : -180);
        cpu.facing = cpu.x > target.x ? 1 : -1;
    } else {
        cpu.body.setVelocityX(0);
        cpu.facing = cpu.x > target.x ? -1 : 1;
    }

    if (cpu.atkCD <= 0 && dist < (cpu.type === 'Gunman' ? 600 : 100)) {
        performAttack(cpu, target);
    }
}

function performAttack(attacker, target) {
    if (attacker.atkCD > 0) return;
    
    attacker.atkCD = attacker.type === 'Gunman' ? 900 : 600;

    if (attacker.type === 'Gunman') {
        // MUZZLE FLASH
        let flash = attacker.scene.add.circle(attacker.x + (attacker.facing * 50), attacker.y - 32, 10, 0xffff00);
        attacker.scene.tweens.add({ targets: flash, alpha: 0, scale: 2, duration: 100, onComplete: () => flash.destroy() });

        // THE BULLET (With larger hit detection)
        let b = attacker.scene.add.rectangle(attacker.x + (attacker.facing * 50), attacker.y - 32, 20, 6, 0xffffff);
        attacker.scene.physics.add.existing(b);
        b.body.setAllowGravity(false);
        b.body.setVelocityX(attacker.facing * 1400);
        b.body.setSize(40, 15); // Large hitbox ensures damage triggers
        
        b.ownerId = attacker.id;
        b.launcher = attacker;
        b.damage = 10;
        bullets.add(b);
    } else {
        // Melee Attack Logic
        let dist = Phaser.Math.Distance.Between(attacker.x, attacker.y, target.x, target.y);
        let inDirection = (attacker.facing === 1 && target.x > attacker.x) || (attacker.facing === -1 && target.x < attacker.x);
        
        if (dist < 110 && inDirection) {
            applyDamage(attacker, target, 12);
        }
    }
}

function applyDamage(attacker, target, amount) {
    target.hp -= amount;
    target.scene.cameras.main.shake(100, 0.005);
    
    // Blood/Spark Effect
    let fx = target.scene.add.circle(target.x, target.y - 30, 15, 0xffffff, 0.6);
    target.scene.tweens.add({ targets: fx, alpha: 0, scale: 3, duration: 200, onComplete: () => fx.destroy() });
}

// --- UI & CONTROLS ---

function setupMobileControls() {
    let scene = this;
    const createBtn = (x, y, label, callback) => {
        let b = scene.add.circle(x, y, 45, 0xffffff, 0.15).setInteractive().setDepth(100);
        scene.add.text(x, y, label, { fontSize: '20px', fontStyle: 'bold' }).setOrigin(0.5);
        b.on('pointerdown', () => callback(true));
        b.on('pointerup', () => callback(false));
    };

    createBtn(80, 380, '←', v => p1.mLeft = v);
    createBtn(180, 380, '→', v => p1.mRight = v);
    createBtn(130, 290, 'UP', v => p1.mUp = v);
    
    let atkBtn = scene.add.circle(750, 380, 50, 0xffffff, 0.2).setInteractive().setDepth(100);
    scene.add.text(750, 380, 'ATK', { fontSize: '24px', fontStyle: 'bold' }).setOrigin(0.5);
    atkBtn.on('pointerdown', () => performAttack(p1, p2));
}

function endGame(winner) {
    gameState = 'END';
    this.physics.pause();
    this.add.rectangle(425, 240, 850, 480, 0x000, 0.8).setDepth(500);
    this.add.text(425, 180, winner + " WINS!", { fontSize: '64px', fill: '#fff' }).setOrigin(0.5).setDepth(501);
    
    createMenuBtn(this, 425, 300, 'BACK TO MENU', () => location.reload()).setDepth(501);
}

</script>
</body>
</html>
